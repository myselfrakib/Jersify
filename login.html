<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>JERSIFY — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import{getAuth,onAuthStateChanged,GoogleAuthProvider,signInWithPopup,RecaptchaVerifier,signInWithPhoneNumber}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import{getDatabase,ref,get,set,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app=initializeApp({
    apiKey:"AIzaSyA4O7ROp8srleiFAZSmiyd6ml7Ruv8eN74",
    authDomain:"jersify-f9b5e.firebaseapp.com",
    databaseURL:"https://jersify-f9b5e-default-rtdb.firebaseio.com",
    projectId:"jersify-f9b5e",
    storageBucket:"jersify-f9b5e.firebasestorage.app",
    messagingSenderId:"461181023878",
    appId:"1:461181023878:web:6ebfbae603baf4a873c307"
  });
  const auth=getAuth(app),db=getDatabase(app),gp=new GoogleAuthProvider();
  window.FB={auth,db,gp,ref,get,set,update,signInWithPopup,RecaptchaVerifier,signInWithPhoneNumber};
  onAuthStateChanged(auth,u=>{if(u)location.href=new URLSearchParams(location.search).get('redirect')||'index.html';});
</script>
<style>
:root{--r:#e63946;--a:#1a1a2e;--fd:'Bebas Neue',sans-serif;--fb:'Nunito',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0a0a1a,#1a1a2e,#0f1a3e);padding:20px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(230,57,70,.18),transparent 55%),
  radial-gradient(ellipse at 80% 20%,rgba(26,26,46,.25),transparent 55%);pointer-events:none}
body::after{content:'JERSIFY';position:fixed;bottom:-30px;right:-20px;font-family:var(--fd);font-size:200px;
  letter-spacing:10px;color:rgba(255,255,255,.025);pointer-events:none;user-select:none}
.bar{position:fixed;top:0;left:0;right:0;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.logo{font-family:var(--fd);font-size:22px;letter-spacing:3px;color:rgba(255,255,255,.7);text-decoration:none;display:flex;align-items:center;gap:7px}
.logo:hover{color:#fff}.dot{width:7px;height:7px;background:var(--r);border-radius:50%}
.back{font-size:13px;font-weight:700;color:rgba(255,255,255,.4);text-decoration:none}.back:hover{color:rgba(255,255,255,.8)}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:32px;
  width:100%;max-width:460px;overflow:hidden;position:relative;z-index:1;margin-top:60px;
  box-shadow:0 40px 80px rgba(0,0,0,.5);animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.top{padding:40px 40px 32px;color:#fff;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
.ico{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,rgba(230,57,70,.3),rgba(230,57,70,.08));
  border:1px solid rgba(230,57,70,.3);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 18px}
.ttl{font-family:var(--fd);font-size:42px;letter-spacing:5px;margin-bottom:4px}
.sub{font-size:12px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.body{padding:32px 40px 40px}
.fg{margin-bottom:18px}
.fl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:1.5px}
.fi{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:#fff;
  padding:13px 16px;font-family:var(--fb);font-size:14px;font-weight:600;border-radius:12px;outline:none;transition:all .2s}
.fi:focus{border-color:rgba(230,57,70,.6);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(230,57,70,.1)}
.fi::placeholder{color:rgba(255,255,255,.25)}
.fgt{text-align:right;margin:-10px 0 18px}
.fgt a{font-size:12px;font-weight:700;color:rgba(255,255,255,.4);text-decoration:none}.fgt a:hover{color:rgba(255,255,255,.8)}
.sbtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--r),#c0242f);color:#fff;border:none;
  font-family:var(--fb);font-size:15px;font-weight:800;border-radius:14px;cursor:pointer;
  box-shadow:0 8px 24px rgba(230,57,70,.3);transition:all .25s;margin-bottom:16px}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(230,57,70,.45)}.sbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.div{text-align:center;position:relative;margin:14px 0}
.div::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.08)}
.div span{position:relative;padding:0 12px;font-size:11px;color:rgba(255,255,255,.3);font-weight:700;text-transform:uppercase}
.gbtn{width:100%;padding:13px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.8);font-family:var(--fb);font-size:14px;font-weight:700;border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.gbtn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.err{background:rgba(230,57,70,.12);border:1.5px solid rgba(230,57,70,.3);color:#ff6b75;
  padding:11px 15px;font-size:13px;font-weight:600;border-radius:10px;margin-bottom:16px;display:none}
.foot{text-align:center;margin-top:22px;padding-top:20px;border-top:1px solid rgba(255,255,255,.07)}
.foot span{font-size:14px;color:rgba(255,255,255,.4);font-weight:600}
.foot a{font-size:14px;color:var(--r);font-weight:800;text-decoration:none}
.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;
  animation:rot .6s linear infinite;display:inline-block;margin-right:8px}
@keyframes rot{to{transform:rotate(360deg)}}
.tw{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--a);color:#fff;border-radius:13px;padding:13px 18px;font-family:var(--fb);font-size:13px;
  font-weight:700;min-width:260px;display:flex;align-items:center;gap:10px;animation:tin .3s ease both}
.toast.ok{background:#10b981}.toast.er{background:var(--r)}
@keyframes tin{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="bar">
  <a class="logo" href="index.html"><span class="dot"></span>JERSIFY</a>
  <a class="back" href="index.html">← Back to Store</a>
</div>
<div class="card">
  <div class="top"><div class="ico">👋</div><div class="ttl">WELCOME BACK</div><div class="sub">Sign in to your account</div></div>
  <div class="body">
    <div id="err" class="err"></div>
    <div id="recaptcha-container" style="display:none;"></div>

    <!-- Step 1: Mobile Input -->
    <div id="step-phone" class="fg">
      <label class="fl">Mobile Number</label>
      <div style="display:flex; gap:8px;">
        <select id="country-code" class="fi" style="flex:0 0 100px; text-align:center; padding:13px 8px;">
          <option value="+91">+91 (IN)</option>
          <option value="+1">+1 (US)</option>
          <option value="+44">+44 (UK)</option>
          <option value="+971">+971 (AE)</option>
          <option value="+61">+61 (AU)</option>
        </select>
        <input class="fi" id="phone" type="tel" placeholder="9876543210" onkeydown="if(event.key==='Enter')sendOTP()"/>
      </div>
    </div>

    <!-- Step 2: OTP Verification Input -->
    <div id="step-otp" class="fg" style="display:none;">
      <label class="fl">Verification Code (OTP)</label>
      <input class="fi" id="otp" type="text" maxlength="6" placeholder="••••••" style="text-align:center; font-family:monospace; letter-spacing:6px; font-size:18px;" onkeydown="if(event.key==='Enter')verifyOTP()"/>
      <div class="fgt" style="margin-top:10px; text-align:left;"><a href="#" onclick="resendOTP(event)">Resend Code</a></div>
    </div>

    <button class="sbtn" id="btn" onclick="handleAuthAction()">Send OTP →</button>
    <div class="div"><span>OR</span></div>
    <button class="gbtn" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="foot"><span>No account? </span><a href="signup.html">Sign up →</a></div>
    <div class="foot" style="margin-top:10px;border:none;padding:0"><span>Admin? </span><a href="admin-login.html">Admin Panel →</a></div>
  </div>
</div>
<div class="tw" id="tw"></div>
<script>
let _confirmationResult = null;
let _recaptchaVerifier = null;

function handleAuthAction() {
  if (!_confirmationResult) {
    sendOTP();
  } else {
    verifyOTP();
  }
}

async function sendOTP() {
  const code = document.getElementById('country-code').value;
  const num = document.getElementById('phone').value.trim().replace(/\s+/g, '');
  const err = document.getElementById('err'), btn = document.getElementById('btn');
  err.style.display = 'none';

  if (!num) { err.textContent = '⛔ Please enter a mobile number.'; err.style.display = 'block'; return; }
  if (num.length < 7) { err.textContent = '⛔ Please enter a valid mobile number.'; err.style.display = 'block'; return; }

  const fullPhone = code + num;
  btn.innerHTML = '<span class="sp"></span>Sending OTP…'; btn.disabled = true;

  try {
    if (!_recaptchaVerifier) {
      _recaptchaVerifier = new FB.RecaptchaVerifier(FB.auth, 'recaptcha-container', {
        'size': 'invisible'
      });
    }

    const conf = await FB.signInWithPhoneNumber(FB.auth, fullPhone, _recaptchaVerifier);
    _confirmationResult = conf;

    document.getElementById('step-phone').style.display = 'none';
    document.getElementById('step-otp').style.display = 'block';
    
    btn.innerHTML = 'Verify OTP →'; btn.disabled = false;
    toast('OTP sent successfully! 💬', 'ok');
  } catch (e) {
    btn.innerHTML = 'Send OTP →'; btn.disabled = false;
    err.textContent = '⛔ ' + (e.message || 'Failed to send OTP.');
    err.style.display = 'block';
    if (_recaptchaVerifier) {
      _recaptchaVerifier.clear();
      _recaptchaVerifier = null;
    }
  }
}

async function verifyOTP() {
  const otpCode = document.getElementById('otp').value.trim();
  const err = document.getElementById('err'), btn = document.getElementById('btn');
  err.style.display = 'none';

  if (!otpCode || otpCode.length !== 6) { err.textContent = '⛔ Enter a 6-digit OTP code.'; err.style.display = 'block'; return; }

  btn.innerHTML = '<span class="sp"></span>Verifying…'; btn.disabled = true;
  try {
    const cr = await _confirmationResult.confirm(otpCode);
    const userRef = FB.ref(FB.db, 'users/' + cr.user.uid);
    const snap = await FB.get(userRef);

    if (!snap.exists()) {
      // Create database profile for phone logins if new
      await FB.set(userRef, {
        uid: cr.user.uid,
        firstName: '',
        lastName: '',
        displayName: 'Customer',
        phone: cr.user.phoneNumber || '',
        role: 'customer',
        createdAt: Date.now(),
        lastLogin: Date.now()
      });
    } else {
      await FB.update(userRef, {
        lastLogin: Date.now(),
        phone: cr.user.phoneNumber || ''
      });
    }

    toast('Logged in successfully! 🔥', 'ok');
  } catch (e) {
    btn.innerHTML = 'Verify OTP →'; btn.disabled = false;
    err.textContent = '⛔ ' + (e.code === 'auth/invalid-verification-code' ? 'Invalid OTP. Please try again.' : e.message || 'Verification failed.');
    err.style.display = 'block';
  }
}

function resendOTP(e) {
  e.preventDefault();
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-phone').style.display = 'block';
  document.getElementById('btn').innerHTML = 'Send OTP →';
  document.getElementById('otp').value = '';
  _confirmationResult = null;
  sendOTP();
}

async function doGoogle(){
  const err=document.getElementById('err');err.style.display='none';
  try{
    const cr=await FB.signInWithPopup(FB.auth,FB.gp);
    const snap=await FB.get(FB.ref(FB.db,'users/'+cr.user.uid));
    if(!snap.exists()){
      const np=(cr.user.displayName||'').split(' ');
      await FB.set(FB.ref(FB.db,'users/'+cr.user.uid),{uid:cr.user.uid,firstName:np[0]||'',lastName:np.slice(1).join(' ')||'',
        displayName:cr.user.displayName||'',email:cr.user.email,photoURL:cr.user.photoURL||'',role:'customer',createdAt:Date.now(),lastLogin:Date.now()});
    }else await FB.update(FB.ref(FB.db,'users/'+cr.user.uid),{lastLogin:Date.now()});
    toast('Logged in with Google! 🚀','ok');
  }catch(e){err.textContent='⛔ Google sign-in failed. '+e.message;err.style.display='block';}
}

function toast(msg,type=''){
  const t=document.createElement('div');t.className='toast'+(type?' '+type:'');
  t.innerHTML='<span>'+(type==='ok'?'✅':type==='er'?'⚠️':'ℹ️')+'</span>'+msg;
  document.getElementById('tw').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3000);
}
</script>
</body>
</html>
