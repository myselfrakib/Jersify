<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JERSIFY — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp }                                       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword,
           onAuthStateChanged, GoogleAuthProvider,
           signInWithPopup, updateProfile }                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, update }                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyA4O7ROp8srleiFAZSmiyd6ml7Ruv8eN74",
    authDomain:        "jersify-f9b5e.firebaseapp.com",
    databaseURL:       "https://jersify-f9b5e-default-rtdb.firebaseio.com",
    projectId:         "jersify-f9b5e",
    storageBucket:     "jersify-f9b5e.firebasestorage.app",
    messagingSenderId: "461181023878",
    appId:             "1:461181023878:web:6ebfbae603baf4a873c307",
    measurementId:     "G-V5E7D09PJ0"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);
  const gp   = new GoogleAuthProvider();

  window.FB = { auth, db, gp, ref, set, get, update,
                createUserWithEmailAndPassword, signInWithPopup, updateProfile };

  window._signingUp = false;

  onAuthStateChanged(auth, user => {
    if (window._signingUp) return;
    if (user) location.href = 'index.html';
  });
</script>

<style>
:root{--acc:#1a1a2e;--red:#e63946;--grn:#10b981;--ff:'Nunito',sans-serif;--fd:'Bebas Neue',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0a0a1a,#1a1a2e,#0f1a3e);position:relative;overflow:hidden;padding:20px}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 80% 20%,rgba(230,57,70,.15) 0%,transparent 55%),
  radial-gradient(ellipse at 20% 80%,rgba(16,185,129,.1) 0%,transparent 55%);pointer-events:none}
body::after{content:'JERSIFY';position:fixed;bottom:-30px;right:-20px;font-family:var(--fd);font-size:200px;
  letter-spacing:10px;color:rgba(255,255,255,.025);pointer-events:none;user-select:none;z-index:0}

.back-bar{position:fixed;top:0;left:0;right:0;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.back-logo{font-family:var(--fd);font-size:22px;letter-spacing:3px;color:rgba(255,255,255,.7);text-decoration:none;display:flex;align-items:center;gap:7px;transition:color .2s}
.back-logo:hover{color:#fff}
.back-logo-dot{width:7px;height:7px;background:var(--red);border-radius:50%}
.back-link{font-size:13px;font-weight:700;color:rgba(255,255,255,.4);text-decoration:none;transition:color .2s}
.back-link:hover{color:rgba(255,255,255,.8)}

.card{background:rgba(255,255,255,.04);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);
  border-radius:32px;width:100%;max-width:480px;box-shadow:0 40px 80px rgba(0,0,0,.5);overflow:hidden;
  position:relative;z-index:1;margin-top:60px;animation:slideUp .5s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.card-top{padding:36px 40px 28px;color:#fff;text-align:center;border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(135deg,rgba(230,57,70,.12),rgba(16,185,129,.06))}
.card-icon{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,rgba(230,57,70,.3),rgba(16,185,129,.15));
  border:1px solid rgba(230,57,70,.25);display:flex;align-items:center;justify-content:center;
  font-size:30px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(230,57,70,.2)}
.card-title{font-family:var(--fd);font-size:40px;letter-spacing:4px;margin-bottom:4px}
.card-sub{font-size:12px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:2px;text-transform:uppercase}

.card-body{padding:30px 40px 36px}
.perks-strip{display:flex;gap:0;margin-bottom:22px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden}
.perk{flex:1;padding:12px 8px;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.perk:last-child{border-right:none}
.perk-icon{font-size:18px;display:block;margin-bottom:4px}
.perk-text{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.5px;line-height:1.3}

.fg{margin-bottom:16px}
.fl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:1.5px}
.fi{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);color:#fff;
  padding:13px 16px;font-family:var(--ff);font-size:14px;font-weight:600;border-radius:12px;transition:all .2s;outline:none}
.fi:focus{border-color:rgba(230,57,70,.6);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(230,57,70,.1)}
.fi::placeholder{color:rgba(255,255,255,.25)}
.fi.valid{border-color:rgba(16,185,129,.6)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Password strength */
.pwd-strength{margin-top:6px;display:flex;gap:4px}
.strength-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.1);transition:background .3s}
.strength-bar.weak{background:var(--red)}.strength-bar.medium{background:#f59e0b}.strength-bar.strong{background:var(--grn)}
.pwd-lbl{font-size:10px;font-weight:700;margin-top:4px;letter-spacing:1px;text-transform:uppercase}

.terms-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:18px}
.terms-check{width:17px;height:17px;accent-color:var(--red);flex-shrink:0;margin-top:1px;cursor:pointer}
.terms-text{font-size:12px;color:rgba(255,255,255,.5);font-weight:600;line-height:1.5}
.terms-text a{color:var(--red);text-decoration:none;font-weight:700}

.sbtn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),#c0242f);color:#fff;border:none;
  font-family:var(--ff);font-size:15px;font-weight:800;border-radius:14px;cursor:pointer;transition:all .25s;
  box-shadow:0 8px 24px rgba(230,57,70,.3);letter-spacing:.5px;margin-bottom:14px}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(230,57,70,.45)}
.sbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.divider{text-align:center;position:relative;margin:12px 0}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.08)}
.divider span{position:relative;background:transparent;padding:0 12px;font-size:11px;color:rgba(255,255,255,.3);font-weight:700;text-transform:uppercase}

.gbtn{width:100%;padding:13px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.8);font-family:var(--ff);font-size:14px;font-weight:700;border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.gbtn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}

.err-msg{background:rgba(230,57,70,.12);border:1.5px solid rgba(230,57,70,.3);color:#ff6b75;padding:11px 15px;font-size:13px;font-weight:600;border-radius:10px;margin-bottom:14px;display:none}
.succ-msg{background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.3);color:#34d399;padding:11px 15px;font-size:13px;font-weight:600;border-radius:10px;margin-bottom:14px;display:none}
.foot-row{text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}
.foot-row span{font-size:14px;color:rgba(255,255,255,.4);font-weight:600}
.foot-row a{font-size:14px;color:var(--red);font-weight:800;text-decoration:none}

.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--acc);color:#fff;border-radius:13px;padding:13px 18px;font-family:var(--ff);font-size:13px;font-weight:700;min-width:260px;display:flex;align-items:center;gap:10px;animation:tIn .3s ease both}
.toast.success{background:var(--grn)}.toast.error{background:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(50px)}}
</style>
</head>
<body>

<div class="back-bar">
  <a class="back-logo" href="index.html"><span class="back-logo-dot"></span>JERSIFY</a>
  <a class="back-link" href="index.html">&#8592; Back to Store</a>
</div>

<div class="card">
  <div class="card-top">
    <div class="card-icon">🚀</div>
    <div class="card-title">JOIN JERSIFY</div>
    <div class="card-sub">Create your account — it's free</div>
  </div>
  <div class="card-body">
    <div class="perks-strip">
      <div class="perk"><span class="perk-icon">🔥</span><span class="perk-text">Early Drop Access</span></div>
      <div class="perk"><span class="perk-icon">📦</span><span class="perk-text">Order Tracking</span></div>
      <div class="perk"><span class="perk-icon">❤️</span><span class="perk-text">Wishlist</span></div>
      <div class="perk"><span class="perk-icon">⚡</span><span class="perk-text">Fast Checkout</span></div>
    </div>

    <div id="errMsg" class="err-msg"></div>
    <div id="succMsg" class="succ-msg"></div>

    <div class="form-row">
      <div class="fg"><label class="fl">First Name</label><input class="fi" id="firstName" placeholder="Alex"/></div>
      <div class="fg"><label class="fl">Last Name</label><input class="fi" id="lastName" placeholder="Kim"/></div>
    </div>
    <div class="fg"><label class="fl">Email Address</label>
      <input class="fi" id="signupEmail" type="email" placeholder="you@email.com" oninput="validateEmail(this)"/>
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <input class="fi" id="signupPwd" type="password" placeholder="Min 6 characters" oninput="checkStrength(this.value)"/>
      <div class="pwd-strength"><div class="strength-bar" id="b1"></div><div class="strength-bar" id="b2"></div><div class="strength-bar" id="b3"></div></div>
      <div class="pwd-lbl" id="strengthLabel" style="color:rgba(255,255,255,.3)"></div>
    </div>
    <div class="fg"><label class="fl">Confirm Password</label>
      <input class="fi" id="confirmPwd" type="password" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')doSignup()"/>
    </div>
    <div class="terms-row">
      <input class="terms-check" type="checkbox" id="termsCheck"/>
      <div class="terms-text">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</div>
    </div>

    <button class="sbtn" id="signupBtn" onclick="doSignup()">Create Account →</button>
    <div class="divider"><span>OR</span></div>
    <button class="gbtn" onclick="doGoogleSignup()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign up with Google
    </button>
    <div class="foot-row"><span>Already have an account? </span><a href="login.html">Login →</a></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
function checkStrength(val) {
  const [b1,b2,b3] = ['b1','b2','b3'].map(id=>document.getElementById(id));
  const lbl = document.getElementById('strengthLabel');
  [b1,b2,b3].forEach(b=>b.className='strength-bar');
  if (!val) { lbl.textContent=''; return; }
  const score = (val.length>=8?1:0) + (/[A-Z0-9]/.test(val)?1:0) + (/[^A-Za-z0-9]/.test(val)?1:0);
  if (val.length < 6) { b1.classList.add('weak'); lbl.textContent='Too short'; lbl.style.color='#e63946'; }
  else if (score<=1) { b1.classList.add('weak'); lbl.textContent='Weak'; lbl.style.color='#e63946'; }
  else if (score===2) { b1.classList.add('medium'); b2.classList.add('medium'); lbl.textContent='Medium'; lbl.style.color='#f59e0b'; }
  else { [b1,b2,b3].forEach(b=>b.classList.add('strong')); lbl.textContent='Strong 💪'; lbl.style.color='#10b981'; }
}
function validateEmail(el) { el.classList.toggle('valid', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)); }

async function doSignup() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName  = document.getElementById('lastName').value.trim();
  const email     = document.getElementById('signupEmail').value.trim();
  const pass      = document.getElementById('signupPwd').value;
  const confirm   = document.getElementById('confirmPwd').value;
  const terms     = document.getElementById('termsCheck').checked;
  const errEl = document.getElementById('errMsg');
  const succEl = document.getElementById('succMsg');
  const btn = document.getElementById('signupBtn');
  errEl.style.display = 'none'; succEl.style.display = 'none';

  if (!firstName || !email || !pass) { errEl.textContent='⛔ Please fill in all required fields.'; errEl.style.display='block'; return; }
  if (pass.length < 6) { errEl.textContent='⛔ Password must be at least 6 characters.'; errEl.style.display='block'; return; }
  if (pass !== confirm) { errEl.textContent='⛔ Passwords do not match.'; errEl.style.display='block'; return; }
  if (!terms) { errEl.textContent='⛔ Please accept the Terms of Service.'; errEl.style.display='block'; return; }

  btn.innerHTML='<span class="spinner"></span>Creating account…'; btn.disabled=true;
  window._signingUp = true;

  try {
    /* 1. Create Auth user */
    const cred = await FB.createUserWithEmailAndPassword(FB.auth, email, pass);
    const uid  = cred.user.uid;
    const displayName = `${firstName} ${lastName}`.trim();

    /* 2. Update Auth profile */
    await FB.updateProfile(cred.user, { displayName });

    /* 3. Write user node to Realtime Database → /users/{uid} */
    await FB.set(FB.ref(FB.db, `users/${uid}`), {
      uid, firstName, lastName, displayName, email,
      createdAt: Date.now(), lastLogin: Date.now(),
      role: 'customer'
    });

    window._signingUp = false;
    btn.innerHTML = 'Create Account →'; btn.disabled = false;
    succEl.textContent = `✅ Account created! Welcome, ${firstName}! Redirecting…`;
    succEl.style.display = 'block';
    showToast(`Welcome, ${firstName}! 🎉`, 'success');
    setTimeout(() => { location.href = 'index.html'; }, 1800);
  } catch(e) {
    window._signingUp = false;
    btn.innerHTML = 'Create Account →'; btn.disabled = false;
    const c = e.code || '';
    if (c.includes('email-already-in-use')) errEl.textContent='⛔ This email is already registered.';
    else if (c.includes('invalid-email')) errEl.textContent='⛔ Invalid email address.';
    else if (c.includes('weak-password')) errEl.textContent='⛔ Password too weak.';
    else if (c.includes('network-request-failed')) errEl.textContent='⛔ Network error. Check your connection.';
    else errEl.textContent='⛔ '+(e.message||'Sign up failed.');
    errEl.style.display='block';
  }
}

async function doGoogleSignup() {
  const errEl = document.getElementById('errMsg');
  errEl.style.display='none';
  window._signingUp = true;
  try {
    const cred = await FB.signInWithPopup(FB.auth, FB.gp);
    const user = cred.user;
    /* Write to Realtime DB if new */
    const snap = await FB.get(FB.ref(FB.db, `users/${user.uid}`));
    if (!snap.exists()) {
      const np = (user.displayName||'').split(' ');
      await FB.set(FB.ref(FB.db, `users/${user.uid}`), {
        uid: user.uid, firstName: np[0]||'', lastName: np.slice(1).join(' ')||'',
        displayName: user.displayName||'', email: user.email,
        photoURL: user.photoURL||'', createdAt: Date.now(), lastLogin: Date.now(), role: 'customer'
      });
    }
    window._signingUp = false;
    showToast('Welcome to JERSIFY! 🚀', 'success');
    setTimeout(() => { location.href = 'index.html'; }, 1200);
  } catch(e) {
    window._signingUp = false;
    errEl.textContent='⛔ Google sign-up failed. '+(e.message||'');
    errEl.style.display='block';
  }
}

function showToast(msg, type='') {
  const t = document.createElement('div');
  t.className=`toast${type?' '+type:''}`;
  t.innerHTML=`<span>${{success:'✅',error:'⚠️','':'ℹ️'}[type]||'ℹ️'}</span>${msg}`;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>{ t.style.animation='tOut .3s ease both'; setTimeout(()=>t.remove(),300); },3000);
}
</script>
</body>
</html>
