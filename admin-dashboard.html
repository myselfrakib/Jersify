/* Normalize RTDB arrays — Firebase stores JS arrays as {0:url,1:url} objects */
function normalizeProduct(raw){
  const p={...raw};
  if(p.images && !Array.isArray(p.images)) p.images=Object.values(p.images);
  if(!p.images || p.images.length===0) p.images=p.imageUrl?[p.imageUrl]:[];
  if(p.images.length>0) p.imageUrl=p.images[0];
  return p;
}

async function initDashboard(){
  await Promise.all([loadProducts(),loadOrders(),loadCustomers()]);
  loadAllMediaSlots();
}

/* ---- LOAD PRODUCTS ---- */
async function loadProducts(){
  try{
    const snap=await FB.get(FB.ref(FB.db,'products'));
    PRODUCTS=[];
    if(snap.exists()) snap.forEach(c=>PRODUCTS.push(normalizeProduct({id:c.key,...c.val()})));
  }catch(e){showToast('Load products failed: '+e.message,'error');}
  const c=PRODUCTS.length;
  document.getElementById('adminProductCount').textContent=c;
  const nb=document.getElementById('navProdBadge');
  if(c>0){nb.textContent=c;nb.style.display='inline-flex';}
  renderProductsTable();
  renderDashboardOrders();
}

/* ---- LOAD ORDERS ---- */
async function loadOrders(){
  try{
    const snap=await FB.get(FB.ref(FB.db,'orders'));
    ORDERS=[];
    if(snap.exists()) snap.forEach(c=>ORDERS.push(c.val()));
    ORDERS.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  }catch(e){}
  const c=ORDERS.length;
  document.getElementById('statOrders').textContent=c;
  const nb=document.getElementById('navOrdBadge');
  if(c>0){nb.textContent=c;nb.style.display='inline-flex';}

  document.getElementById('statRevenue').textContent='&#8377;'+rev.toLocaleString('en-IN');
  renderOrdersTable(); renderDashboardOrders();
}

/* ---- PREVIEW IMAGES ---- */
function previewImages(input,containerId){
  const files=Array.from(input.files).slice(0,5);
  const container=document.getElementById(containerId); if(!container) return;
  container.innerHTML='';
  files.forEach((file,i)=>{
    const wrap=document.createElement('div'); wrap.className='img-preview-item';
    const img=document.createElement('img'); img.src=URL.createObjectURL(file);
    const lbl=document.createElement('div'); lbl.className='img-preview-label';
    lbl.textContent=i===0?'MAIN':(i+1).toString();
    wrap.appendChild(img); wrap.appendChild(lbl); container.appendChild(wrap);
  });
}

/* ---- UPLOAD IMAGES TO STORAGE → returns array of download URLs ---- */
async function uploadImages(files,fillId,labelId){
  const urls=[];
  const fill=document.getElementById(fillId);
  const lbl=document.getElementById(labelId);
  const progWrap=fill?fill.closest('.progress-wrap'):null;
  if(progWrap) progWrap.style.display='block';

  for(let i=0;i<files.length;i++){
    const file=files[i];
    const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const path='products/'+Date.now()+'_'+i+'_'+safeName;
    const storageRef=FB.sRef(FB.storage,path);
    if(lbl) lbl.textContent='Uploading image '+(i+1)+' of '+files.length+'...';
    const url=await new Promise((resolve,reject)=>{
      const task=FB.uploadBytesResumable(storageRef,file);
      task.on('state_changed',
        snap=>{
          const pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);
          const overall=Math.round(((i+pct/100)/files.length)*100);
          if(fill) fill.style.width=overall+'%';
        },
        err=>reject(err),
        async ()=>{
          const dlURL=await FB.getDownloadURL(task.snapshot.ref);
          resolve(dlURL);
        }
      );
    });
    urls.push(url);
  }
  if(progWrap) progWrap.style.display='none';
  if(fill) fill.style.width='0%';
  return urls;
}

/* ---- ADD PRODUCT ---- */
async function addProduct(){
  const name=document.getElementById('ap_name').value.trim();
  const price=parseInt(document.getElementById('ap_price').value)||0;
  if(!name||!price){showToast('Name and price are required','error');return;}
  const btn=document.getElementById('addProdBtn');
  btn.textContent='Saving...'; btn.disabled=true;
  try{
    const files=Array.from(document.getElementById('ap_imgs').files).slice(0,5);
    let imageUrls=[];
    if(files.length>0) imageUrls=await uploadImages(files,'ap_progressFill','ap_progressLabel');

    const product={
      name,price,
      team:document.getElementById('ap_team').value.trim()||'',
      originalPrice:parseInt(document.getElementById('ap_origprice').value)||null,
      stock:parseInt(document.getElementById('ap_stock').value)||0,
      category:document.getElementById('ap_cat').value,
      badge:document.getElementById('ap_badge').value,
      club:document.getElementById('ap_club').value||'other',
      emoji:document.getElementById('ap_emoji').value||'&#128085;',
      sizes:['S','M','L','XL'],
      imageUrl:imageUrls[0]||'',
      createdAt:Date.now()
    };
    /* Only write images array when there are multiple — RTDB has issues with empty arrays */
    if(imageUrls.length>1) product.images=imageUrls;

    const newRef=FB.push(FB.ref(FB.db,'products'));
    product.id=newRef.key;
    await FB.set(newRef,product);

    PRODUCTS.push(normalizeProduct(product));
    document.getElementById('adminProductCount').textContent=PRODUCTS.length;
    const nb=document.getElementById('navProdBadge');
    nb.textContent=PRODUCTS.length; nb.style.display='inline-flex';

    const imgMsg=imageUrls.length>0?' ('+imageUrls.length+' image'+(imageUrls.length>1?'s':'')+')':'';
    showToast(name+' added!'+imgMsg,'success');
    closeModal('addProduct');
    renderProductsTable();

    ['ap_name','ap_team','ap_price','ap_origprice','ap_stock','ap_emoji'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('ap_emoji').value='&#128085;';
    document.getElementById('ap_imgs').value='';
    document.getElementById('ap_previews').innerHTML='';
  }catch(e){
    showToast('Failed: '+e.message,'error');
    console.error('addProduct error:',e);
  }finally{btn.textContent='Add to Catalogue'; btn.disabled=false;}
}

/* ---- OPEN EDIT ---- */
function openEditProduct(pid){
  const p=PRODUCTS.find(x=>x.id===pid);
  if(!p){showToast('Product not found','error');return;}
  document.getElementById('ep_id').value=p.id;
  document.getElementById('ep_name').value=p.name||'';
  document.getElementById('ep_team').value=p.team||'';
  document.getElementById('ep_price').value=p.price||'';
  document.getElementById('ep_origprice').value=p.originalPrice||'';
  document.getElementById('ep_stock').value=p.stock||'';
  document.getElementById('ep_emoji').value=p.emoji||'&#128085;';
  document.getElementById('ep_imgs').value='';
  document.getElementById('ep_newPreviews').innerHTML='';
  ['ep_cat','ep_club','ep_badge'].forEach(id=>{
    const sel=document.getElementById(id);
    const keyMap={ep_cat:'category',ep_club:'club',ep_badge:'badge'};
    const val=(p[keyMap[id]]||'').toLowerCase();
    [...sel.options].forEach(o=>o.selected=o.value.toLowerCase()===val||o.text.toLowerCase()===val);
  });
  const curWrap=document.getElementById('ep_currentPreviews'); curWrap.innerHTML='';
  const imgs=p.images&&p.images.length?p.images:(p.imageUrl?[p.imageUrl]:[]);
  imgs.forEach((url,i)=>{
    const div=document.createElement('div'); div.className='img-preview-item';
    div.innerHTML='<img src="'+url+'" onerror="this.style.display=\'none\'"/><div class="img-preview-label">'+(i===0?'MAIN':(i+1).toString())+'</div>';
    curWrap.appendChild(div);
  });
  openModal('editProduct');
}

/* ---- SAVE EDIT ---- */
async function saveEditProduct(){
  const pid=document.getElementById('ep_id').value;
  const name=document.getElementById('ep_name').value.trim();
  const price=parseInt(document.getElementById('ep_price').value)||0;
  if(!name||!price){showToast('Name and price are required','error');return;}
  const btn=document.getElementById('editProdBtn');
  btn.textContent='Saving...'; btn.disabled=true;
  try{
    const idx=PRODUCTS.findIndex(x=>x.id===pid);
    if(idx===-1){showToast('Product not found','error');return;}
    const files=Array.from(document.getElementById('ep_imgs').files).slice(0,5);
    let imageUrls=[];
    if(files.length>0) imageUrls=await uploadImages(files,'ep_progressFill','ep_progressLabel');
    const updates={
      name,price,
      team:document.getElementById('ep_team').value.trim()||'',
      originalPrice:parseInt(document.getElementById('ep_origprice').value)||null,
      stock:parseInt(document.getElementById('ep_stock').value)||0,
      category:document.getElementById('ep_cat').value,
      badge:document.getElementById('ep_badge').value,
      club:document.getElementById('ep_club').value||'other',
      emoji:document.getElementById('ep_emoji').value||'&#128085;',
    };
    if(imageUrls.length>0){
      updates.imageUrl=imageUrls[0];
      updates.images=imageUrls.length>1?imageUrls:null;
    } else {
      updates.imageUrl=PRODUCTS[idx].imageUrl||'';
      updates.images=PRODUCTS[idx].images&&PRODUCTS[idx].images.length>1?PRODUCTS[idx].images:null;
    }
    await FB.update(FB.ref(FB.db,'products/'+pid),updates);
    PRODUCTS[idx]=normalizeProduct({...PRODUCTS[idx],...updates});
    renderProductsTable();
    closeModal('editProduct');
    showToast(name+' updated!','success');
  }catch(e){showToast('Update failed: '+e.message,'error');console.error(e);}
  finally{btn.textContent='&#128190; Save Changes'; btn.disabled=false;}
}

/* ---- DELETE ---- */
async function deleteProduct(pid,name){
  if(!confirm('Delete "'+name+'"? Cannot be undone.')) return;
  try{
    await FB.remove(FB.ref(FB.db,'products/'+pid));
    PRODUCTS=PRODUCTS.filter(p=>p.id!==pid);
    document.getElementById('adminProductCount').textContent=PRODUCTS.length;
    renderProductsTable(); showToast(name+' deleted','error');
  }catch(e){showToast('Delete failed: '+e.message,'error');}
}

  if(!ORDERS.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--muted);font-weight:700">No orders yet</td></tr>';return;}
  tbody.innerHTML=ORDERS.map(o=>`

      <td><select class="form-input" style="padding:7px 10px;font-size:12px;width:auto;border-radius:9px" onchange="updateOrderStatus('${o.orderId}',this.value)">

        <option ${o.status==='shipped'?'selected':''} value="shipped">Shipped</option>
        <option ${o.status==='out_for_delivery'?'selected':''} value="out_for_delivery">Out for Delivery</option>

async function updateOrderStatus(orderId,status){
  try{
    await FB.update(FB.ref(FB.db,'orders/'+orderId),{status});
    const o=ORDERS.find(x=>x.orderId===orderId); if(o) o.status=status;
    showToast(orderId+' updated!','success');
    renderOrdersTable(); renderDashboardOrders();
  }catch(e){showToast('Update failed','error');}
}

/* ---- ADMIN MEMBERS ---- */
async function loadAdminMembers(){
  try{
    const snap=await FB.get(FB.ref(FB.db,'admins'));
    adminMembers=[];
    if(snap.exists()) snap.forEach(c=>adminMembers.push({uid:c.key,...c.val()}));
  }catch(e){adminMembers=[];}
  const list=document.getElementById('adminMembersList');
  const label=document.getElementById('adminCountLabel');
  if(!list) return;
  if(label) label.textContent=adminMembers.length+' member'+(adminMembers.length!==1?'s':'');
  if(!adminMembers.length){list.innerHTML='<div class="empty-state"><span class="empty-icon">&#128274;</span><div class="empty-title">No admins found</div></div>';return;}
  list.innerHTML=adminMembers.map((a,i)=>`
    <div class="member-row">
      <div class="member-avatar">${(a.name||'A')[0].toUpperCase()}</div>
      <div class="member-info">
        <div class="member-name">${a.name||'&mdash;'}</div>
        <div class="member-email">${a.email||'&mdash;'}</div>
        <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">
          <span class="chip">${a.role||'Admin'}</span>
          <span class="badge ${a.status?'badge-active':'badge-inactive'}">${a.status?'&#9679; Active':'&#9679; Inactive'}</span>
        </div>
      </div>
      <div class="member-actions">
        <button class="btn btn-sm ${a.status?'btn-danger':'btn-success'}" onclick="toggleAdminStatus(${i})">${a.status?'Disable':'Enable'}</button>
        <button class="btn btn-danger btn-sm" onclick="removeAdmin(${i})">Remove</button>
      </div>
    </div>`).join('');
}
async function toggleAdminStatus(i){
  adminMembers[i].status=!adminMembers[i].status;
  const a=adminMembers[i];
  try{await FB.update(FB.ref(FB.db,'admins/'+a.uid),{status:a.status});}catch(e){}
  showToast(a.name+' '+( a.status?'Active':'Inactive'),a.status?'success':'error');
  loadAdminMembers();
}
async function removeAdmin(i){
  const a=adminMembers[i];
  if(!confirm('Remove '+a.name+' from admins?')) return;
  try{await FB.remove(FB.ref(FB.db,'admins/'+a.uid));}catch(e){}
  showToast(a.name+' removed','error');
  loadAdminMembers();
}

/* ---- MEDIA MANAGER ---- */
async function loadAllMediaSlots(){
  try{
    const snap=await FB.get(FB.ref(FB.db,'media'));
    mediaCache={};
    if(snap.exists()) snap.forEach(c=>{mediaCache[c.key]=c.val();});
  }catch(e){}
  const grid=document.getElementById('mediaManagerGrid'); if(!grid) return;
  grid.innerHTML='';
  MEDIA_SLOTS.forEach(slot=>{
    const m=mediaCache[slot.id];
    const filled=!!(m&&m.url);
    const card=document.createElement('div'); card.className='media-card';
    let preview='';
    if(filled){
      if(m.type==='image') preview='<img src="'+m.url+'" alt="'+slot.label+'"/>';
      else if(m.type==='video') preview='<video src="'+m.url+'" muted autoplay loop playsinline></video>';
      else if(m.type==='youtube') preview='<iframe src="https://www.youtube.com/embed/'+m.url+'?autoplay=1&mute=1&loop=1&playlist='+m.url+'" frameborder="0" allowfullscreen></iframe>';
    } else {
      preview='<div class="media-empty"><div class="media-empty-icon">'+slot.icon+'</div><div class="media-empty-label">'+slot.label+'<br>'+slot.rec+'</div></div>';
    }
    card.innerHTML=
      '<div class="media-preview'+(slot.dark?'':' light')+'">'+preview+'<div class="slot-badge '+(filled?'filled':'')+'">'+slot.id+'</div></div>'+
      '<div class="media-info">'+
        '<div class="media-title"><span class="sdot '+(filled?'filled':'empty')+'"></span>'+slot.label+'</div>'+
        '<div class="media-desc">'+slot.desc+' &middot; <strong>'+slot.rec+'</strong></div>'+
        '<div class="media-form">'+
          '<button class="media-save-btn" onclick="openMediaModal(''+slot.id+'')">'+
            (filled?'&#9998;&#65039; Edit / Replace':'&#128228; Upload / Add Media')+'</button>'+
          (filled?'<button class="media-clear-btn" onclick="confirmClearSlot(''+slot.id+'')">&#10005; Remove</button>':'')+
        '</div>'+
      '</div>';
    grid.appendChild(card);
  });
}

function openMediaModal(slotId){
  const slot=MEDIA_SLOTS.find(s=>s.id===slotId); if(!slot) return;
  currentMediaSlot=slot;
  const m=mediaCache[slotId];
  document.getElementById('mediaSlotId').value=slotId;
  document.getElementById('mediaSlotIsVideo').value=slot.isVideo?'1':'0';
  document.getElementById('mediaModalTitle').textContent=slot.label;
  document.getElementById('youtubeTab').style.display=slot.isVideo?'block':'none';
  document.getElementById('mediaVideoOpts').style.display=slot.isVideo?'block':'none';
  document.getElementById('mediaAltGroup').style.display=slot.isVideo?'none':'block';
  document.getElementById('media_file').accept=slot.isVideo?'image/*,video/*':'image/*';
  document.getElementById('mediaUploadIcon').textContent=slot.isVideo?'&#127916;':'&#128444;&#65039;';
  document.getElementById('mediaUploadTitle').textContent=slot.isVideo?'Tap to choose image or video':'Tap to choose image';
  document.getElementById('mediaUploadSub').textContent=slot.isVideo?'JPG, PNG, MP4, WEBM - max 50MB':'JPG, PNG, WEBP - max 10MB';
  const prevBox=document.getElementById('mediaPreviewBox');
  const prevSection=document.getElementById('mediaCurrentPreview');
  if(m&&m.url){
    prevSection.style.display='block';
    if(m.type==='image') prevBox.innerHTML='<img src="'+m.url+'" style="width:100%;height:100%;object-fit:cover"/>';
    else if(m.type==='video') prevBox.innerHTML='<video src="'+m.url+'" muted autoplay loop style="width:100%;height:100%;object-fit:cover"></video>';
    else if(m.type==='youtube') prevBox.innerHTML='<iframe src="https://www.youtube.com/embed/'+m.url+'?autoplay=1&mute=1" frameborder="0" style="width:100%;height:100%;border:none"></iframe>';
    document.getElementById('mediaClearBtn').style.display='block';
  } else {
    prevSection.style.display='none';
    document.getElementById('mediaClearBtn').style.display='none';
  }
  document.getElementById('media_url_input').value=(m&&m.url&&m.type!=='youtube')?m.url:'';
  document.getElementById('media_alt_input').value=(m&&m.alt)?m.alt:'';
  document.getElementById('media_yt_input').value=(m&&m.type==='youtube')?m.url:'';
  if(m&&m.autoplay!==undefined) document.getElementById('media_autoplay').checked=m.autoplay;
  if(m&&m.controls!==undefined) document.getElementById('media_controls').checked=m.controls;
  document.getElementById('media_file').value='';
  document.getElementById('mediaProgress').style.display='none';
  document.getElementById('mediaProgressFill').style.width='0%';
  setMediaMethod('upload',document.querySelector('#mediaModal .method-tab'));
  openModal('media');
}

function setMediaMethod(method,btn){
  mediaMethod=method;
  document.querySelectorAll('#mediaModal .method-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('mediaUploadSection').style.display=method==='upload'?'block':'none';
  document.getElementById('mediaUrlSection').style.display=method==='url'?'block':'none';
  document.getElementById('mediaYoutubeSection').style.display=method==='youtube'?'block':'none';
}

function handleMediaFilePreview(input){
  const file=input.files[0]; if(!file) return;
  const zone=document.getElementById('mediaUploadZone')||document.querySelector('#mediaUploadSection .upload-zone');
  if(!zone) return;
  zone.querySelectorAll('img.upload-preview,video.upload-video-preview').forEach(el=>el.remove());
  const isVid=file.type.startsWith('video/');
  if(isVid){
    const v=document.createElement('video'); v.className='upload-video-preview';
    v.src=URL.createObjectURL(file); v.muted=true; v.controls=true;
    v.style.cssText='width:100%;max-height:160px;border-radius:10px;margin-top:10px;display:block';
    zone.appendChild(v);
  } else {
    const img=document.createElement('img'); img.className='upload-preview';
    img.src=URL.createObjectURL(file);
    img.style.cssText='width:100%;max-height:160px;object-fit:contain;border-radius:10px;display:block;margin-top:10px';
    zone.appendChild(img);
  }
}

async function saveMediaSlot(){
  if(!currentMediaSlot) return;
  const slotId=currentMediaSlot.id;
  const isVideo=currentMediaSlot.isVideo;
  const btn=document.getElementById('mediaSaveBtn');
  btn.textContent='Saving...'; btn.disabled=true;
  try{
    let data={updatedAt:Date.now()};
    if(mediaMethod==='upload'){
      const file=document.getElementById('media_file').files[0];
      if(!file){showToast('Please choose a file first','error');return;}
      const isVidFile=file.type.startsWith('video/');
      data.type=isVidFile?'video':'image';
      const prog=document.getElementById('mediaProgress');
      const fill=document.getElementById('mediaProgressFill');
      const lbl=document.getElementById('mediaProgressLabel');
      prog.style.display='block';
      const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const storageRef=FB.sRef(FB.storage,'media/'+slotId+'/'+Date.now()+'_'+safeName);
      await new Promise((res,rej)=>{
        const task=FB.uploadBytesResumable(storageRef,file);
        task.on('state_changed',
          s=>{const pct=Math.round(s.bytesTransferred/s.totalBytes*100);fill.style.width=pct+'%';lbl.textContent='Uploading... '+pct+'%';},
          rej,
          async ()=>{data.url=await FB.getDownloadURL(task.snapshot.ref);res();}
        );
      });
      prog.style.display='none';
    } else if(mediaMethod==='url'){
      const url=document.getElementById('media_url_input').value.trim();
      if(!url){showToast('Please enter a URL','error');return;}
      data.type='image'; data.url=url;
      data.alt=document.getElementById('media_alt_input').value.trim()||slotId;
    } else if(mediaMethod==='youtube'){
      const ytId=document.getElementById('media_yt_input').value.trim();
      if(!ytId){showToast('Please enter a YouTube video ID','error');return;}
      data.type='youtube'; data.url=ytId;
    }
    if(isVideo&&data.type!=='image'){
      data.autoplay=document.getElementById('media_autoplay').checked;
      data.controls=document.getElementById('media_controls').checked;
    }
    await FB.set(FB.ref(FB.db,'media/'+slotId),data);
    mediaCache[slotId]=data;
    showToast(slotId+' saved! Storefront updated','success');
    closeModal('media');
    loadAllMediaSlots();
  }catch(e){showToast('Save failed: '+e.message,'error');console.error(e);}
  finally{btn.textContent='&#128190; Save to Storefront'; btn.disabled=false;}
}

async function confirmClearSlot(slotId){
  if(!confirm('Remove media from '+slotId+'?')) return;
  try{await FB.remove(FB.ref(FB.db,'media/'+slotId));}catch(e){}
  delete mediaCache[slotId];
  showToast(slotId+' cleared','error');
  loadAllMediaSlots();
}
async function clearMediaSlot(){
  closeModal('media');
  await confirmClearSlot(document.getElementById('mediaSlotId').value);
}

/* ---- TABS ---- */
function switchTab(tab,btn){
  document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('tab-'+tab); if(el) el.classList.add('active');
  if(btn) btn.classList.add('active');
  if(tab==='products') renderProductsTable();
  if(tab==='orders') loadOrders();
  if(tab==='customers') loadCustomers().then(()=>renderCustomersTable());
  if(tab==='admins') loadAdminMembers();
  if(tab==='media') loadAllMediaSlots();
  if(tab==='dashboard') renderDashboardOrders();
  closeSidebar();
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open');}
function setActiveBnav(el){document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));el.classList.add('active');}

function openModal(name){document.getElementById(name+'Modal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(name){document.getElementById(name+'Modal').classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal(ov.id.replace('Modal',''));});
});

async function doSignOut(){try{await FB.signOut(FB.auth);}catch(e){}location.href='admin-login.html';}

function showToast(msg,type=''){
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast'+(type?' '+type:'');
  t.innerHTML='<span>'+({success:'&#10003;',error:'&#9888;','':'&#8505;'}[type]||'&#8505;')+'</span>'+msg;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.animation='tOut .3s ease both';setTimeout(()=>t.remove(),300);},3500);
}

window.addEventListener('load',()=>{
  if(localStorage.getItem('adminAddTab')==='1'){localStorage.removeItem('adminAddTab');setTimeout(loadAdminMembers,600);}
});
