<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JERSIFY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style id="root-vars">/* injected dynamically */</style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #fff5f5;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .page {
      width: min(100%, var(--maxw));
      min-height: 100vh;
      background: var(--page-bg, #fff5f5);
      position: relative;
      overflow: hidden;
      border-left: 1px solid rgba(0,0,0,.04);
      border-right: 1px solid rgba(0,0,0,.04);
      padding-bottom: 100px;
    }

    /* ========== HERO ========== */
    .hero {
      position: relative;
      height: 460px;
      overflow: hidden;
      background: var(--dark);
    }
    .hero-bg-stripes {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 1;
      transition: background-image 0.5s ease;
    }
    .hero-sun {
      position: absolute;
      top: -60px; right: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--sky-rgb),0.3) 0%, rgba(var(--sky-rgb),0.08) 50%, transparent 70%);
      animation: pulse-sun 3s ease-in-out infinite;
    }
    .hero-sun2 {
      position: absolute;
      bottom: -40px; left: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--sky-rgb),0.2) 0%, transparent 70%);
      animation: pulse-sun 4s 1s ease-in-out infinite;
    }
    @keyframes pulse-sun {
      0%,100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .hero-sun-rays {
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      pointer-events: none;
    }
    .hero-sun-rays svg {
      width: 100%; height: 100%;
      animation: spin-slow 20s linear infinite;
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.18) 0%,
        rgba(0,0,0,0.05) 40%,
        rgba(0,0,0,0.6) 100%
      );
      z-index: 2;
    }
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      z-index: 10;
    }
    .back-btn, .wishlist-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .back-btn:hover, .wishlist-btn:hover { background: rgba(255,255,255,0.2); }
    .back-btn svg, .wishlist-btn svg { width: 20px; height: 20px; }
    .logo-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: #fff;
    }
    .hero-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 20px 28px;
      z-index: 5;
    }
    .country-flag-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      animation: slide-up 0.6s ease both;
    }
    .flag-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.5);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: opacity 0.3s ease;
    }
    .flag-circle img { width: 100%; height: 100%; object-fit: cover; }
    .flag-circle svg { width: 100%; height: 100%; }
    .country-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 0.88;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: slide-up 0.6s 0.1s ease both;
    }
    .hero-title span { color: var(--sky); }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 14px;
      animation: slide-up 0.6s 0.2s ease both;
      flex-wrap: wrap;
    }
    .hero-stat-pill {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .hero-stat-pill strong { color: var(--pill-accent, #ffaaaa); }
    .hero-captain-float {
      position: absolute;
      right: 16px;
      bottom: 0;
      width: 155px;
      height: 195px;
      z-index: 6;
      animation: float-hero 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
      transition: opacity 0.4s ease;
    }
    .hero-captain-float img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
    }
    @keyframes float-hero {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-10px) rotate(-5deg); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== SECTION ========== */
    .section { padding: 20px 20px 0; }
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--sky), transparent);
      border-radius: 2px;
    }

    /* ========== ACHIEVEMENTS ========== */
    .achievements-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .achievement-card {
      background: #fff;
      border-radius: 18px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(var(--sky-rgb),0.12);
      border: 1px solid rgba(var(--sky-rgb),0.1);
      position: relative;
      overflow: hidden;
    }
    .achievement-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sky), var(--sky-light,#aaa));
    }
    .achievement-icon { font-size: 28px; margin-bottom: 6px; }
    .achievement-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 2px;
    }
    .achievement-num span { color: var(--sky-dark); }
    .achievement-label {
      font-size: 9.5px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 1.2;
    }

    /* ========== HIGHLIGHT BANNER ========== */
    .highlight-banner {
      margin: 0 20px 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2,#3a0000) 50%, var(--sky-dark) 100%);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(var(--sky-rgb),0.25);
      position: relative;
      overflow: hidden;
    }
    .highlight-banner::before {
      content: attr(data-emoji);
      position: absolute;
      right: -10px; top: -20px;
      font-size: 120px;
      opacity: 0.06;
      line-height: 1;
    }
    .hl-trophy { font-size: 48px; flex-shrink: 0; }
    .hl-text h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #fff;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .hl-text p { font-size: 12px; color: rgba(255,255,255,0.75); line-height: 1.4; }
    .hl-years { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .hl-year-badge {
      background: rgba(var(--sky-rgb),0.25);
      border: 1px solid rgba(var(--sky-rgb),0.5);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--pill-accent, #ffaaaa);
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* ========== FEATURED PLAYER ========== */
    .featured-player {
      margin: 20px 20px 0;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2,#3a0000) 100%);
      box-shadow: 0 12px 36px rgba(var(--sky-rgb),0.3);
      position: relative;
    }
    .fp-stripes {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg,
        rgba(var(--sky-rgb),0.07) 0px, rgba(var(--sky-rgb),0.07) 20px,
        transparent 20px, transparent 40px);
    }
    .fp-content {
      position: relative; z-index: 2;
      padding: 20px;
      display: flex; gap: 16px;
      align-items: flex-start;
    }
    .fp-left { flex: 1; }
    .fp-kicker {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--pill-accent, #ffaaaa);
      margin-bottom: 6px;
      font-family: 'Barlow Condensed', sans-serif;
    }
    .fp-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; line-height: 0.9;
      color: #fff; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .fp-role {
      font-size: 11px; font-weight: 600;
      color: var(--pill-accent, rgba(255,150,150,0.9));
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .fp-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .fp-stat {
      background: rgba(255,255,255,0.07);
      border-radius: 12px; padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .fp-stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800;
      color: var(--pill-accent, #ffaaaa);
      line-height: 1;
    }
    .fp-stat-key {
      font-size: 9px; font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .fp-right {
      width: 120px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .fp-jersey {
      width: 110px; height: 130px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    .fp-jersey img {
      width: 110px; height: 130px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    .fp-number-overlay {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 1px;
      color: rgba(255,255,255,0.8);
      text-align: center;
    }

    /* ========== PRODUCTS ========== */
    .products-section { padding: 20px 20px 0; }
    .products-scroll {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .product-card {
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 6px 20px rgba(var(--sky-rgb),0.12);
      border: 1px solid rgba(var(--sky-rgb),0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(var(--sky-rgb),0.18); }
    .product-card:active { transform: scale(0.97); }
    .product-card-top {
      height: 170px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-card-top.sky-bg {
      background: linear-gradient(135deg, var(--sky) 0%, #fff 40%, var(--sky) 100%);
    }
    .product-card-top img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
      cursor: zoom-in;
    }
    .product-card:hover .product-card-top img { transform: scale(1.04); }
    .product-badge-new {
      position: absolute; top: 10px; left: 10px;
      background: var(--sky);
      color: #fff; font-size: 9px; font-weight: 800;
      letter-spacing: 0.5px; border-radius: 6px;
      padding: 2px 7px;
      font-family: 'Barlow Condensed', sans-serif;
      text-transform: uppercase;
      z-index: 2;
    }
    .product-card-bottom { padding: 12px; }
    .product-card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 800;
      color: var(--dark); margin-bottom: 2px;
      letter-spacing: 0.3px;
    }
    .product-card-sub { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .product-card-footer {
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 800;
      color: var(--dark);
    }
    .buy-btn {
      border: none;
      background: linear-gradient(135deg, var(--sky-dark), var(--dark));
      color: #fff;
      border-radius: 12px;
      padding: 6px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(var(--sky-rgb),0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .buy-btn:hover { box-shadow: 0 6px 16px rgba(var(--sky-rgb),0.45); }
    .buy-btn:active { transform: scale(0.88); }

    /* ========== TIMELINE ========== */
    .timeline { padding: 0 20px; position: relative; }
    .timeline-line {
      position: absolute;
      left: 36px; top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--sky), transparent);
    }
    .timeline-item {
      display: flex; gap: 14px;
      align-items: flex-start;
      margin-bottom: 16px; position: relative;
    }
    .timeline-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sky), var(--sky-dark));
      border: 2px solid #fff;
      box-shadow: 0 3px 10px rgba(var(--sky-rgb),0.35);
      display: grid; place-items: center;
      flex-shrink: 0; font-size: 12px; z-index: 1;
    }
    .timeline-content {
      background: #fff;
      border-radius: 14px; padding: 12px 14px;
      flex: 1;
      box-shadow: 0 4px 14px rgba(var(--sky-rgb),0.08);
      border: 1px solid rgba(var(--sky-rgb),0.08);
    }
    .timeline-year {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      color: var(--sky-dark); letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .timeline-event { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 2px; }
    .timeline-detail { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* ========== IMAGE LIGHTBOX ========== */
    .img-lightbox-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .img-lightbox-overlay.open {
      display: flex;
      animation: lb-fade 0.25s ease both;
    }
    @keyframes lb-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes lb-zoom { from { transform: scale(0.75); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .img-lightbox-img {
      max-width: min(90vw, 420px); max-height: 70vh;
      border-radius: 20px; object-fit: contain;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      animation: lb-zoom 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }
    .img-lightbox-close {
      position: absolute; top: 20px; right: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: #fff; font-size: 22px;
      display: grid; place-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .img-lightbox-close:hover { background: rgba(255,255,255,0.28); }
    .img-lightbox-caption {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-align: center; max-width: 320px;
    }

    /* ========== LOADING / EMPTY ========== */
    .product-loading {
      grid-column: 1/-1;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 30px;
      color: var(--muted); font-size: 13px;
    }
    .product-loading-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sky); opacity: 0.5;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .product-loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .product-loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .no-products {
      grid-column: 1/-1;
      text-align: center; padding: 30px 20px;
      color: var(--muted); font-size: 13px;
    }

    /* ========== IMAGE SYNC TOAST ========== */
    .sync-toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(20,20,20,0.92);
      backdrop-filter: blur(12px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 9998;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s ease;
      opacity: 0;
      white-space: nowrap;
      pointer-events: none;
    }
    .sync-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .sync-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 6px;
      vertical-align: middle;
      animation: blink-dot 1.2s ease-in-out infinite;
    }
    @keyframes blink-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .spacer { height: 20px; }
  </style>
</head>
<body>

<!-- SYNC TOAST -->
<div class="sync-toast" id="syncToast">
  <span class="sync-dot"></span> Images synced from database
</div>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;color:#fff;font-family:sans-serif;">
    <div style="text-align:center;">
      <div style="font-size:48px;margin-bottom:16px;">⚽</div>
      <div style="font-size:18px;font-weight:700;">Team not found</div>
      <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:8px;">Try <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:6px;">?id=arsenal</code></div>
      <a href="index.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:#e63946;color:#fff;border-radius:12px;text-decoration:none;font-weight:700;">← Back to Store</a>
    </div>
  </div>
</div>

<div class="img-lightbox-overlay" id="imgLightbox" onclick="closeLightbox(event)">
  <button class="img-lightbox-close" onclick="closeLightbox(event)" aria-label="Close">✕</button>
  <img class="img-lightbox-img" id="lightboxImg" src="" alt="Product Image" />
  <div class="img-lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
/* ================================================================
   TEAM CONFIGS — heroBg / captainImg are now FALLBACK DEFAULTS.
   Live values are stored in Firebase under /teamimages/{id}/
   and override these on load + sync in real-time.
================================================================ */
const TEAM_CONFIGS = {
  "arsenal": {
    id: "arsenal", name: "Arsenal",
    vars: {

function buildJerseySVG(fill, num, label, darkShade) {
  return `<svg viewBox="0 0 110 130" xmlns="http://www.w3.org/2000/svg" width="110" height="130">
    <path d="M28 30 L15 46 L28 52 L28 118 L82 118 L82 52 L95 46 L82 30 C78 28 70 26 66 22 C63 20 62 18 55 18 C48 18 47 20 44 22 C40 26 32 28 28 30Z" fill="${fill}"/>
    <path d="M46 18 L46 118 L64 118 L64 18 C62 17.5 57 17 55 17 C53 17 48 17.5 46 18Z" fill="rgba(255,255,255,0.18)"/>
    <path d="M28 30 L15 46 L28 52Z" fill="${darkShade || fill}"/>
    <path d="M82 30 L95 46 L82 52Z" fill="${darkShade || fill}"/>
    <path d="M46 18 C48 14 52 12 55 12 C58 12 62 14 64 18" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <text x="55" y="88" text-anchor="middle" font-family="'Bebas Neue', sans-serif" font-size="36" fill="rgba(255,255,255,0.92)">${num}</text>
    <rect x="32" y="36" width="18" height="18" rx="3" fill="rgba(0,0,0,0.3)"/>
    <text x="41" y="49" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.9)" font-weight="bold">${label}</text>
  </svg>`;
}

function buildHeroBg(cfg) {
  if (cfg.heroBg) {
    return `<div class="hero-bg-stripes" id="heroBgEl"></div>
            <div class="hero-overlay"></div>`;
  }
  return `<div class="hero-bg-stripes" id="heroBgEl"></div>
          <div class="hero-sun"></div>
          <div class="hero-sun2"></div>
          <div class="hero-sun-rays">
            <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
              ${Array.from({length:12},(_,i)=>{
                const r=`rotate(${i*30},160,160)`;
                return `<rect x="155" y="0" width="10" height="80" rx="5" fill="rgba(var(--sky-rgb),0.08)" transform="${r}"/>`;
              }).join('')}
            </svg>
          </div>
          <div class="hero-overlay"></div>`;
}

/* ================================================================
   PAGE HTML BUILDER
   IDs for live sync:
     #heroBgEl       → hero background image
     #heroCaptFloat  → floating captain image (hero)
     #flagCircleEl   → club/country logo circle
     #fpJerseyEl     → featured player jersey / captain photo
================================================================ */
function buildPageHTML(id, cfg, data) {
  const honourCards = data.honours.map(h =>
    `<div class="achievement-card">
      <div class="achievement-icon">${h.icon}</div>
      <div class="achievement-num"><span>${h.num}</span></div>
      <div class="achievement-label">${h.label}</div>
    </div>`
  ).join('');

  const pills = data.pills.map(p =>
    `<div class="hero-stat-pill">${p}</div>`
  ).join('');

  const bannerYears = data.bannerYears.map(y =>
    `<div class="hl-year-badge">${y}</div>`
  ).join('');

  const captainSvg = buildJerseySVG(
    data.captainSvgFill, data.captainSvgNum, data.captainSvgLabel, cfg.vars['sky-dark']
  );
  const fpJerseyInner = cfg.captainImg
    ? `<img src="${cfg.captainImg}" alt="${data.captainName.replace(/<br>/g,' ')}" />`
    : captainSvg;

  const captainStats = data.captainStats.map(s =>
    `<div class="fp-stat">
      <div class="fp-stat-val">${s.v}</div>
      <div class="fp-stat-key">${s.k}</div>
    </div>`
  ).join('');

  const heroFloatInner = cfg.captainImg
    ? `<img src="${cfg.captainImg}" alt="${cfg.name} Captain" />`
    : '';

  const timelineHTML = data.timeline.map(t =>
    `<div class="timeline-item">
      <div class="timeline-dot">${t.dot}</div>
      <div class="timeline-content">
        <div class="timeline-year">${t.year}</div>
        <div class="timeline-event">${t.event}</div>
        <div class="timeline-detail">${t.detail}</div>
      </div>
    </div>`
  ).join('');

  return `
    <section class="hero">
      ${buildHeroBg(cfg)}
      <div class="topbar">
        <button class="back-btn" onclick="history.back()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="logo-badge">JERSIFY</div>
        <button class="wishlist-btn" id="wishlistBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="wishlistIcon">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>
      <div class="hero-content">
        <div class="country-flag-row">
          <div class="flag-circle" id="flagCircleEl">${data.flagHTML}</div>
          <div class="country-label">${data.label}</div>
        </div>
        <div class="hero-title">${data.titleA}<span>${data.titleB}</span></div>
        <div class="hero-meta">${pills}</div>
      </div>
      <div class="hero-captain-float" id="heroCaptFloat" style="${heroFloatInner ? '' : 'display:none;'}">${heroFloatInner}</div>
    </section>

    <section class="section" style="margin-top:20px;">
      <div class="section-title">Honours</div>
      <div class="achievements-row">${honourCards}</div>
    </section>

    <div class="highlight-banner" data-emoji="${data.bannerEmoji}">
      <div class="hl-trophy">${data.bannerTrophy}</div>
      <div class="hl-text">
        <h3>${data.bannerTitle}</h3>
        <p>${data.bannerDesc}</p>
        <div class="hl-years">${bannerYears}</div>
      </div>
    </div>

    <section class="section" style="margin-top:20px;">
      <div class="section-title">Icon Player</div>
    </section>

    <div class="featured-player">
      <div class="fp-stripes"></div>
      <div class="fp-content">
        <div class="fp-left">
          <div class="fp-kicker">${data.captainKicker}</div>
          <div class="fp-name">${data.captainName}</div>
          <div class="fp-role">${data.captainRole}</div>
          <div class="fp-stats-grid">${captainStats}</div>
        </div>
        <div class="fp-right">
          <div class="fp-jersey" id="fpJerseyEl">${fpJerseyInner}</div>
          <div class="fp-number-overlay">${data.captainOverlay}</div>
        </div>
      </div>
    </div>

    <section class="products-section" style="margin-top:20px;">
      <div class="section-title" style="padding:0;">${data.shopTitle}</div>
    </section>

    <div style="padding:0 20px;margin-top:14px;">
      <div class="products-scroll" id="productsGrid">
        <div class="product-loading">
          <div class="product-loading-dot"></div>
          <div class="product-loading-dot"></div>
          <div class="product-loading-dot"></div>
        </div>
      </div>
    </div>

    <section class="section" style="margin-top:20px;">
      <div class="section-title">Legacy</div>
    </section>

    <div class="timeline">
      <div class="timeline-line"></div>
      ${timelineHTML}
    </div>

    <div class="spacer"></div>
  `;
}

(function () {
  const id   = (new URLSearchParams(location.search).get('id') || '').toLowerCase().trim();
  const cfg  = TEAM_CONFIGS[id];
  const data = PAGE_DATA[id];
  if (!cfg || !data) return;

  window._JERSIFY_ID  = id;
  window._JERSIFY_CFG = cfg;
  window._JERSIFY_DATA = data;

  document.title = 'JERSIFY — ' + cfg.name;

  const v = cfg.vars;
  document.getElementById('root-vars').textContent = `:root {
    --sky:          ${v['sky']           || '#888'};
    --sky-dark:     ${v['sky-dark']      || '#666'};
    --sky-light:    ${v['sky-light']     || '#aaa'};
    --sky-rgb:      ${v['sky-rgb']       || '128,128,128'};
    --dark:         ${v['dark']          || '#111'};
    --dark2:        ${v['dark2']         || '#222'};
    --text:         ${v['text']          || '#111'};
    --muted:        ${v['muted']         || '#888'};
    --pill-accent:  ${v['pill-accent']   || '#ffddaa'};
    --page-bg:      ${v['page-bg']       || '#fff5f5'};
    --maxw: 430px; --radius: 24px;
  }`;

  document.getElementById('app').innerHTML =
    '<div class="page">' + buildPageHTML(id, cfg, data) + '</div>';

  /* Apply static hero bg fallback immediately */
  if (cfg.heroBg) {
    const el = document.getElementById('heroBgEl');
    if (el) el.style.backgroundImage = `url('${cfg.heroBg}')`;
  }

  /* Wishlist button */
  const wishlistBtn  = document.getElementById('wishlistBtn');
  const wishlistIcon = document.getElementById('wishlistIcon');
  let wishlisted = false;
  if (wishlistBtn) {
    wishlistBtn.addEventListener('click', () => {
      wishlisted = !wishlisted;
      wishlistBtn.style.background = wishlisted ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.1)';
      if (wishlistIcon) wishlistIcon.setAttribute('fill', wishlisted ? '#fff' : 'none');
      wishlistBtn.style.transform = 'scale(1.2)';
      setTimeout(() => wishlistBtn.style.transform = 'scale(1)', 200);
    });
  }

  /* Scroll-in animations */
  requestAnimationFrame(() => {
    const cards = document.querySelectorAll(
      '.achievement-card, .product-card, .timeline-item, .featured-player'
    );
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity   = '1';
          e.target.style.transform = 'translateY(0)';
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    cards.forEach((c, i) => {
      c.style.opacity    = '0';
      c.style.transform  = 'translateY(24px)';
      c.style.transition = `opacity .4s ease ${i * .05}s, transform .4s ease ${i * .05}s`;
      io.observe(c);
    });
  });
})();

/* ================================================================
   LIGHTBOX
================================================================ */
function openLightbox(imgUrl, name) {
  const overlay = document.getElementById('imgLightbox');
  const img     = document.getElementById('lightboxImg');
  const cap     = document.getElementById('lightboxCaption');
  img.src  = imgUrl || '';
  img.style.display = imgUrl ? 'block' : 'none';
  cap.textContent = name || '';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  const overlay = document.getElementById('imgLightbox');
  const img     = document.getElementById('lightboxImg');
  if (e && e.target === img) return;
  if (!e || e.target === overlay || (e.target && e.target.classList.contains('img-lightbox-close'))) {
    overlay.classList.remove('open');
    img.src = '';
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ================================================================
   TOAST HELPER
================================================================ */
function showSyncToast(msg) {
  const t = document.getElementById('syncToast');
  if (!t) return;
  t.innerHTML = `<span class="sync-dot"></span> ${msg}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

<!-- ================================================================
  FIREBASE MODULE — Products + Team Images DB Sync
  
  DB STRUCTURE:
    /teamimages/{teamId}/hero     → hero banner image URL
    /teamimages/{teamId}/captain  → captain/player image URL
    /teamimages/{teamId}/logo     → club/country logo URL

  BEHAVIOUR:
    1. On load: check if /teamimages/{id} exists in DB.
       • If NOT → write current hardcoded values as defaults (seed).
       • If YES → leave existing DB values untouched (user may have updated them).
    2. onValue listener keeps all 3 images in sync in real-time.
       Any external update to the DB (e.g. admin panel) is reflected
       instantly on screen without a page reload.
    3. DOM targets (set in buildPageHTML):
         #heroBgEl      → background-image CSS
         #heroCaptFloat → floating hero captain img src
         #flagCircleEl  → logo circle innerHTML
         #fpJerseyEl    → featured player jersey img src
================================================================ -->
<script type="module">
  import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, get, set }
                                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  (function () {
    const id   = window._JERSIFY_ID;
    const cfg  = window._JERSIFY_CFG;
    const data = window._JERSIFY_DATA;
    if (!id || !cfg || !data) return;

    /* ── Firebase init ── */
    const app = initializeApp({
      apiKey:            "AIzaSyA4O7ROp8srleiFAZSmiyd6ml7Ruv8eN74",
      authDomain:        "jersify-f9b5e.firebaseapp.com",
      projectId:         "jersify-f9b5e",
      storageBucket:     "jersify-f9b5e.firebasestorage.app",
      messagingSenderId: "461181023878",
      appId:             "1:461181023878:web:6ebfbae603baf4a873c307",
      databaseURL:       "https://jersify-f9b5e-default-rtdb.firebaseio.com"
    });
    const rtdb = getDatabase(app);

    /* ── Helper: extract URL from flagHTML if it's an <img> ── */
    function extractLogoUrl(flagHTML) {
      const match = (flagHTML || '').match(/src=["']([^"']+)["']/);
      return match ? match[1] : '';
    }

    /* ── DOM helpers ── */
    function applyHero(url) {
      if (!url) return;
      const el = document.getElementById('heroBgEl');
      if (el) {
        el.style.backgroundImage = `url('${url}')`;
        el.style.backgroundSize  = 'cover';
        el.style.backgroundPosition = 'center';
      }
    }

    function applyCaptain(url) {
      if (!url) return;

      /* Hero floating image */
      const floatEl = document.getElementById('heroCaptFloat');
      if (floatEl) {
        floatEl.style.display = '';
        floatEl.innerHTML =
          `<img src="${url}" alt="${cfg.name} Captain"
                style="width:100%;height:100%;object-fit:contain;object-position:bottom center;" />`;
      }

      /* Featured player jersey */
      const jerseyEl = document.getElementById('fpJerseyEl');
      if (jerseyEl) {
        jerseyEl.innerHTML =
          `<img src="${url}" alt="Captain"
                style="width:110px;height:130px;object-fit:contain;
                       filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));" />`;
      }
    }

    function applyLogo(url) {
      if (!url) return;
      const el = document.getElementById('flagCircleEl');
      if (el) {
        el.innerHTML =
          `<img src="${url}"
                style="width:100%;height:100%;object-fit:cover;"
                alt="${cfg.name} Logo" />`;
      }
    }

    /* ── Path: /teamimages/{id} ── */
    const teamImgRef = ref(rtdb, `teamimages/${id}`);

    /* ── STEP 1: Seed DB with defaults if entry is missing ── */
    get(teamImgRef).then(snap => {
      if (!snap.exists()) {
        /* Build the default record from hardcoded data */
        const defaults = {
          hero:    cfg.heroBg     || '',
          captain: cfg.captainImg || '',
          logo:    data.flagImgUrl || extractLogoUrl(data.flagHTML) || ''
        };
        set(teamImgRef, defaults)
          .then(() => console.log(`[JERSIFY] Seeded /teamimages/${id}`, defaults))
          .catch(err => console.warn('[JERSIFY] Seed failed:', err));
      } else {
        console.log(`[JERSIFY] /teamimages/${id} already exists — skipping seed.`);
      }
    }).catch(err => console.warn('[JERSIFY] get() failed:', err));

    /* ── STEP 2: Real-time listener — apply images whenever DB changes ── */
    let firstLoad = true;
    onValue(teamImgRef, snap => {
      if (!snap.exists()) return;
      const imgs = snap.val();

      /* Apply each image if present */
      if (imgs.hero)    applyHero(imgs.hero);
      if (imgs.captain) applyCaptain(imgs.captain);
      if (imgs.logo)    applyLogo(imgs.logo);

      /* Show toast on subsequent updates (not on initial load) */
      if (!firstLoad) {
        showSyncToast('Images synced from database');
      }
      firstLoad = false;

      console.log(`[JERSIFY] Synced /teamimages/${id}:`, imgs);
    }, err => console.warn('[JERSIFY] onValue error:', err));

  })();

</script>

<!-- Product engine as separate module to avoid double-init issues -->
<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  (function () {
    const id  = window._JERSIFY_ID;
    const cfg = window._JERSIFY_CFG;
    if (!id || !cfg) return;

    /* Get existing app (already initialised above) */
    const app  = getApps()[0];
    const rtdb = getDatabase(app);

    const NAME_RULES = [
      ["paris saint germain",  "psg"],
      ["paris saint-germain",  "psg"],
      ["manchester united",    "man-utd"],
      ["manchester city",      "man-city"],
      ["real madrid",          "real-madrid"],
      ["fc barcelona",         "barcelona"],
      ["liverpool fc",         "liverpool"],
      ["chelsea fc",           "chelsea"],
      ["arsenal fc",           "arsenal"],
      ["man united",           "man-utd"],
      ["man city",             "man-city"],
      ["man utd",              "man-utd"],
      ["arsenal",              "arsenal"],
      ["barcelona",            "barcelona"],
      ["liverpool",            "liverpool"],
      ["chelsea",              "chelsea"],
      ["psg",                  "psg"],
      ["argentina",            "argentina"],
      ["brazil",               "brazil"],
      ["portugal",             "portugal"],
      ["france",               "france"],
      ["germany",              "germany"],
      ["spain",                "spain"],
    ];

    function resolveTeamFromName(rawName) {
      const n = (rawName || '').toLowerCase();
      for (const [keyword, pageId] of NAME_RULES) {
        if (n.includes(keyword)) return pageId;
      }
      return null;
    }

    onValue(ref(rtdb, 'products'), snapshot => {
      const container = document.getElementById('productsGrid');
      if (!container) return;

      let html = '';

      snapshot.forEach(child => {
        const p   = child.val();
        const key = child.key;
        if (p.status && p.status !== 'active') return;
        const resolvedTeam = resolveTeamFromName(p.name);
        if (resolvedTeam !== id) return;

        const safeName = (p.name || 'Kit').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const imgUrl   = p.imgUrl || '';

        html += `
          <div class="product-card">
            <div class="product-card-top${imgUrl ? '' : ' sky-bg'}"
                 onclick="openLightbox('${imgUrl}','${safeName}')">
              ${p.badge ? `<div class="product-badge-new">${p.badge}</div>` : ''}
              ${imgUrl
                ? `<img src="${imgUrl}" alt="${p.name || 'Kit'}" loading="lazy" />`
                : `<svg viewBox="0 0 100 120" width="90" height="108" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;">
                    <path d="M25 28 L13 42 L25 47 L25 108 L75 108 L75 47 L87 42 L75 28 C72 26 64 24 60 21 C58 19 57 17 50 17 C43 17 42 19 40 21 C36 24 28 26 25 28Z" fill="var(--sky)"/>
                    <path d="M25 28 L13 42 L25 47Z" fill="var(--sky-dark)" opacity="0.9"/>
                    <path d="M75 28 L87 42 L75 47Z" fill="var(--sky-dark)" opacity="0.9"/>
                    <text x="50" y="82" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="22" fill="rgba(255,255,255,.92)">${cfg.name.substring(0,3).toUpperCase()}</text>
                  </svg>`
              }
            </div>
            <div class="product-card-bottom">
              <div class="product-card-name">${p.name || 'Jersify Kit'}</div>
              <div class="product-card-sub">${p.type || 'Kit'}</div>
              <div class="product-card-footer">
                <div class="product-price">${p.price ? '₹' + p.price : '₹1499'}</div>
                <button class="buy-btn"
                  onclick="event.stopPropagation();window.location.href='checkout.html?id=${key}'">
                  BUY NOW
                </button>
              </div>
            </div>
          </div>`;
      });

      container.innerHTML = html ||
        `<div class="no-products">No products available yet for ${cfg.name}.</div>`;

      /* Animate in */
      container.querySelectorAll('.product-card').forEach((card, i) => {
        card.style.opacity    = '0';
        card.style.transform  = 'translateY(24px)';
        card.style.transition = `opacity .4s ease ${i * 0.08}s, transform .4s ease ${i * 0.08}s`;
        setTimeout(() => {
          card.style.opacity   = '1';
          card.style.transform = 'translateY(0)';
        }, 50);
      });

      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.style.opacity   = '1';
            e.target.style.transform = 'translateY(0)';
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08 });
      container.querySelectorAll('.product-card').forEach(c => io.observe(c));
    });
  })();
</script>
