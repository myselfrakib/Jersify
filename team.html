<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JERSIFY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style id="root-vars">/* injected dynamically */</style>
  <style>
* {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: #fff5f5;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .page {
            width: min(100%, var(--maxw));
            min-height: 100vh;
            background: #fff5f5;
            position: relative;
            overflow: hidden;
            border-left: 1px solid rgba(0, 0, 0, .04);
            border-right: 1px solid rgba(0, 0, 0, .04);
            padding-bottom: 100px;
        }

        /* ========== HERO ========== */
        .hero {
            position: relative;
            height: 460px;
            overflow: hidden;
            background: var(--dark);
        }

        .hero-bg-stripes {
            position: absolute;
            inset: 0;
            background: url('https://firebasestorage.googleapis.com/v0/b/jersify-f9b5e.firebasestorage.app/o/products%2F1774945175872_WhatsApp%20Image%202026-03-30%20at%203.50.05%20PM%20(1).jpeg?alt=media&token=c7e5de04-290b-429a-bdf6-30fae3adb926') center center / cover no-repeat;
            opacity: 1;
        }

        .hero-bg-gradient {
            display: none;
        }

        .hero-sun {
            position: absolute;
            top: -60px;
            right: -60px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(239, 1, 7, 0.3) 0%, rgba(239, 1, 7, 0.08) 50%, transparent 70%);
            animation: pulse-sun 3s ease-in-out infinite;
        }

        @keyframes pulse-sun {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        .hero-sun-rays {
            position: absolute;
            top: -80px;
            right: -80px;
            width: 320px;
            height: 320px;
        }

        .hero-sun-rays svg {
            width: 100%;
            height: 100%;
            animation: spin-slow 20s linear infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            z-index: 10;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .logo-badge {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
            color: #fff;
        }

        .wishlist-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .wishlist-btn svg {
            width: 20px;
            height: 20px;
        }

        .hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 20px 28px;
            z-index: 5;
        }

        .country-flag-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            animation: slide-up 0.6s ease both;
        }

        .flag-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.5);
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .flag-circle svg {
            width: 100%;
            height: 100%;
        }

        .country-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 72px;
            line-height: 0.88;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: slide-up 0.6s 0.1s ease both;
        }

        .hero-title span {
            color: #EF0107;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
            animation: slide-up 0.6s 0.2s ease both;
        }

        .hero-stat-pill {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 6px 14px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .hero-stat-pill strong {
            color: #ffaaaa;
        }

        .hero-jersey-float {
            position: absolute;
            right: 16px;
            bottom: 20px;
            width: 140px;
            height: 175px;
            z-index: 6;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-10px) rotate(-5deg);
            }
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== ACHIEVEMENTS ========== */
        .section {
            padding: 20px 20px 0;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--sky), transparent);
            border-radius: 2px;
        }

        .achievements-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .achievement-card {
            background: #fff;
            border-radius: 18px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(239, 1, 7, 0.1);
            border: 1px solid rgba(239, 1, 7, 0.1);
            position: relative;
            overflow: hidden;
        }

        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--sky), #ff6666);
        }

        .achievement-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .achievement-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px;
            color: var(--dark);
            line-height: 1;
            margin-bottom: 2px;
        }

        .achievement-num span {
            color: var(--sky-dark);
        }

        .achievement-label {
            font-size: 9.5px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* ========== BANNER ========== */
        .world-cup-banner {
            margin: 0 20px 20px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--dark) 0%, #3a0000 50%, var(--sky-dark) 100%);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(26, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .world-cup-banner::before {
            content: '🔴';
            position: absolute;
            right: -10px;
            top: -20px;
            font-size: 120px;
            opacity: 0.06;
            line-height: 1;
        }

        .wc-trophy {
            font-size: 48px;
            flex-shrink: 0;
        }

        .wc-text h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .wc-text p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.4;
        }

        .wc-years {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .wc-year-badge {
            background: rgba(239, 1, 7, 0.25);
            border: 1px solid rgba(239, 1, 7, 0.5);
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
            color: #ffaaaa;
            font-family: 'Barlow Condensed', sans-serif;
        }

        /* ========== FEATURED PLAYER ========== */
        .featured-player {
            margin: 20px 20px 0;
            border-radius: 22px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--dark) 0%, #3a0000 100%);
            box-shadow: 0 12px 36px rgba(26, 0, 0, 0.35);
            position: relative;
        }

        .fp-stripes {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    rgba(239, 1, 7, 0.07) 0px, rgba(239, 1, 7, 0.07) 20px,
                    transparent 20px, transparent 40px);
        }

        .fp-content {
            position: relative;
            z-index: 2;
            padding: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .fp-left {
            flex: 1;
        }

        .fp-kicker {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffaaaa;
            margin-bottom: 6px;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .fp-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            line-height: 0.9;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .fp-role {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 150, 150, 0.9);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .fp-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .fp-stat {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .fp-stat-val {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #ffaaaa;
            line-height: 1;
        }

        .fp-stat-key {
            font-size: 9px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .fp-right {
            width: 120px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .fp-jersey {
            width: 110px;
            height: 130px;
            position: relative;
        }

        .fp-number-overlay {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        /* ========== PRODUCTS ========== */
        .products-section {
            padding: 20px 20px 0;
        }

        .products-scroll {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .product-card {
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 6px 20px rgba(239, 1, 7, 0.12);
            border: 1px solid rgba(239, 1, 7, 0.1);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-card-top {
            height: 170px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card-top.sky-bg {
            background: linear-gradient(135deg, var(--sky) 0%, #fff 40%, var(--sky) 100%);
        }

        .product-card-top.dark-bg {
            background: linear-gradient(135deg, var(--dark) 0%, #3a0000 100%);
        }

        .product-badge-new {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--sky);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            border-radius: 6px;
            padding: 2px 7px;
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
        }

        .product-card-bottom {
            padding: 12px;
        }

        .product-card-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 2px;
            letter-spacing: 0.3px;
        }

        .product-card-sub {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .product-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .product-price {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--dark);
        }

        .add-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--sky-dark), var(--dark));
            color: #fff;
            display: grid;
            place-items: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 1, 7, 0.35);
        }

        .add-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ========== HISTORY TIMELINE ========== */
        .timeline {
            padding: 0 20px;
            position: relative;
        }

        .timeline-line {
            position: absolute;
            left: 36px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--sky), transparent);
        }

        .timeline-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 16px;
            position: relative;
        }

        .timeline-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sky), var(--sky-dark));
            border: 2px solid #fff;
            box-shadow: 0 3px 10px rgba(239, 1, 7, 0.35);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            font-size: 12px;
            z-index: 1;
        }

        .timeline-content {
            background: #fff;
            border-radius: 14px;
            padding: 12px 14px;
            flex: 1;
            box-shadow: 0 4px 14px rgba(239, 1, 7, 0.08);
            border: 1px solid rgba(239, 1, 7, 0.08);
        }

        .timeline-year {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--sky-dark);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .timeline-event {
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 2px;
        }

        .timeline-detail {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.4;
        }

        /* ========== CTA ========== */
        .cta-banner {
            margin: 20px 20px 0;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--sky-dark) 0%, var(--dark) 100%);
            padding: 22px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(239, 1, 7, 0.2);
            position: relative;
            overflow: hidden;
        }

        .cta-banner::before {
            content: '';
            position: absolute;
            right: -30px;
            bottom: -30px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 30px solid rgba(255, 255, 255, 0.06);
        }

        .cta-text h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .cta-text p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        .cta-btn {
            border: none;
            background: #fff;
            color: var(--sky-dark);
            border-radius: 12px;
            padding: 12px 18px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: 0 6px 18px rgba(239, 1, 7, 0.25);
        }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 12px;
            width: min(100%, calc(var(--maxw) - 16px));
            background: rgba(255, 255, 255, .96);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 22px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, .08);
            display: flex;
            justify-content: space-around;
            padding: 10px 8px;
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #999;
            min-width: 56px;
            cursor: pointer;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .nav-item.active {
            color: var(--sky-dark);
            font-weight: 700;
        }

        .spacer {
            height: 20px;
        }

      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;

      letter-spacing: 0.5px;
      text-align: center;
      max-width: 320px;
    }

      position: absolute;

      right: 20px;
      width: 44px;

      border-radius: 50%;

      border: 1.5px solid rgba(255,255,255,0.3);

      font-size: 22px;

      animation: lb-zoom 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }
.img-lightbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      animation: lb-fade 0.25s ease;
    }
.img-lightbox-overlay.open {
      display: flex;
    }
.open {
      display: flex;
    }
.player-name {

      font-family: 'Barlow Condensed', sans-serif;

      font-size: 14px;

      font-weight: 800;

      letter-spacing: 0.3px;

      color: var(--dark);

      margin-bottom: 8px;

      line-height: 1.1;

    }
.hero-flame {
      position: absolute;
      top: -80px;
      right: -50px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(246,196,0,0.25) 0%, rgba(200,16,46,0.3) 40%, transparent 70%);
      animation: pulse-glow 3s ease-in-out infinite;
    }
.hero-flame2 {
      position: absolute;
      bottom: -40px;

      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,16,46,0.2) 0%, transparent 70%);
      animation: pulse-glow 4s 1s ease-in-out infinite;
    }
.hero-liverbird {
      position: absolute;
      top: 20px;
      right: 16px;
      width: 140px;
      height: 140px;
      opacity: 0.07;
      font-size: 130px;
      line-height: 1;
      user-select: none;
    }
.red-bg {
      background: linear-gradient(135deg, var(--sky) 0%, #fff 40%, var(--sky) 100%);
    }
.ucl-banner {
      margin: 0 20px 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0005 50%, #7a0818 100%);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;

          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    cards.forEach((c, i) => {
      c.style.opacity   = '0';
      c.style.transform = 'translateY(24px)';
      c.style.transition= `opacity .4s ease ${i*.05}s,transform .4s ease ${i*.05}s`;
      io.observe(c);
    });

    // Nav tabs
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    // Cart-button bounce
    document.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', function () {
        this.style.transform = 'scale(.8)';
        setTimeout(() => this.style.transform = 'scale(1)', 150);
      });
    });
  });
})();

// ── lightbox ──────────────────────────────────────────────────────
function openLightbox(imgUrl, name) {
  const overlay = document.getElementById('imgLightbox');
  const img     = document.getElementById('lightboxImg');
  const cap     = document.getElementById('lightboxCaption');
  img.src  = imgUrl || '';
  img.style.display = imgUrl ? 'block' : 'none';
  cap.textContent = name || '';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (!e || e.target === document.getElementById('imgLightbox') || e.target.classList.contains('img-lightbox-close')) {
    document.getElementById('imgLightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

    authDomain:        "jersify-f9b5e.firebaseapp.com",

  onValue(ref(rtdb, 'products'), snapshot => {

      const match = keys.some(k => team === k || team.includes(k) || pname.includes(k));
      if (!match) return;
      if (p.status && p.status !== 'active') return;

      html += `

          <div class="product-card-top sky-bg" style="${p.imgUrl ? 'background:none;' : ''}">
            ${p.badge ? `<div class="product-badge-new">${p.badge}</div>` : ''}
            ${p.imgUrl
              ? `<img src="${p.imgUrl}" style="width:100%;height:100%;object-fit:cover;" alt="${p.name || 'Kit'}"/>`
              : `<svg viewBox="0 0 100 120" width="90" height="108" xmlns="http://www.w3.org/2000/svg">
                  <path d="M25 28 L13 42 L25 47 L25 108 L75 108 L75 47 L87 42 L75 28 C72 26 64 24 60 21 C58 19 57 17 50 17 C43 17 42 19 40 21 C36 24 28 26 25 28Z" fill="var(--sky)"/>
                  <path d="M25 28 L13 42 L25 47Z" fill="var(--gold)" opacity="0.9"/>
                  <path d="M75 28 L87 42 L75 47Z" fill="var(--gold)" opacity="0.9"/>
                  <text x="50" y="82" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="22" fill="rgba(255,255,255,.92)">${cfg.name.substring(0,3).toUpperCase()}</text>
                </svg>`
            }
          </div>
          <div class="product-card-bottom">
            <div class="product-card-name">${p.name || 'Jersify Kit'}</div>
            <div class="product-card-sub">${p.type || p.team || 'Kit'}</div>
            <div class="product-card-footer">
              <div class="product-price">${p.price ? '₹' + p.price : '₹1499'}</div>
              <button class="add-btn" onclick="window.location.href='checkout.html?id=${key}'" style="font-size:10px;font-weight:bold;border-radius:12px;width:auto;padding:0 8px;background:var(--sky-dark);">BUY</button>
            </div>
          </div>
        </div>`;
    });

    container.innerHTML = html || `<div style="color:var(--muted);font-size:13px;padding:20px;text-align:center;grid-column:1/-1;">No products available yet for ${cfg.name}.</div>`;

    container.querySelectorAll('.product-card').forEach((card, i) => {
      card.style.cssText += `opacity:0;transform:translateY(24px);transition:opacity .4s ease ${i*.08}s,transform .4s ease ${i*.08}s`;
      setTimeout(() => { card.style.opacity='1'; card.style.transform='translateY(0)'; }, 50);
    });
  });
</script>
