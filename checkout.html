<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JERSIFY — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c14;
      --card: #16162a;
      --card-border: rgba(255, 255, 255, 0.06);
      --card-glow: rgba(198, 31, 47, 0.08);
      --text: #f0f0f5;
      --muted: #7a7a9a;
      --accent: #e63946;
      --accent-dark: #b51f2e;
      --accent-glow: rgba(230, 57, 70, 0.3);
      --success: #2ecc71;
      --gold: #f6c400;
      --radius: 16px;
      --maxw: 480px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: min(100%, var(--maxw));
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding-bottom: 120px;
      background: linear-gradient(180deg, #0c0c14 0%, #12122a 50%, #0c0c14 100%);
    }

    /* ====== Topbar ====== */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      background: rgba(12, 12, 20, 0.95);
      backdrop-filter: blur(12px);
      z-index: 30;
      border-bottom: 1px solid var(--card-border);
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    .topbar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-left: auto;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ====== Content ====== */
    .content {
      padding: 16px 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    }

    .card-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-header svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    /* ====== Product Card ====== */
    .product-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .product-img {
      width: 80px;
      height: 100px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-dark), #1a1a2e);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }

    .product-img-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: rgba(255, 255, 255, 0.5);
    }

    .product-info {
      flex: 1;
    }

    .product-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .product-team {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .product-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    /* ====== Size Selector ====== */
    .size-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .size-btn {
      width: 44px;
      height: 38px;
      border-radius: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: grid;
      place-items: center;
    }

    .size-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .size-btn.active {
      border-color: var(--accent);
      background: rgba(230, 57, 70, 0.12);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(230, 57, 70, 0.2);
    }

    /* ====== Form ====== */
    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'Barlow Condensed', sans-serif;
    }

    .form-input {
      width: 100%;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      outline: none;
      transition: all 0.25s;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(230, 57, 70, 0.04);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    textarea.form-input {
      resize: none;
      min-height: 70px;
      line-height: 1.5;
    }

    /* ====== Location Button ====== */
    .location-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px dashed rgba(46, 204, 113, 0.3);
      border-radius: 12px;
      padding: 10px 14px;
      background: rgba(46, 204, 113, 0.05);
      color: var(--success);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      width: 100%;
      transition: all 0.25s;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .location-btn:hover {
      background: rgba(46, 204, 113, 0.1);
      border-color: rgba(46, 204, 113, 0.5);
    }

    .location-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .location-btn.success {
      border-color: rgba(46, 204, 113, 0.5);
      background: rgba(46, 204, 113, 0.1);
      color: var(--success);
    }

    .location-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .location-text {
      flex: 1;
      font-size: 12px;
    }

    /* ====== Coupon Section ====== */
    .coupon-row {
      display: flex;
      gap: 8px;
    }

    .coupon-input {
      flex: 1;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      outline: none;
      transition: all 0.25s;
    }

    .coupon-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      text-transform: none;
      font-weight: 400;
      letter-spacing: 0;
    }

    .coupon-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(246, 196, 0, 0.08);
    }

    .coupon-apply-btn {
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      background: linear-gradient(135deg, var(--gold), #d4a300);
      color: #1a1a2e;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .coupon-apply-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(246, 196, 0, 0.3);
    }

    .coupon-msg {
      font-size: 11px;
      margin-top: 8px;
      font-weight: 600;
      display: none;
    }

    .coupon-msg.success {
      color: var(--success);
      display: block;
    }

    .coupon-msg.error {
      color: var(--accent);
      display: block;
    }

    .coupon-tags {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .coupon-tag {
      background: rgba(246, 196, 0, 0.08);
      border: 1px solid rgba(246, 196, 0, 0.2);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .coupon-tag:hover {
      background: rgba(246, 196, 0, 0.15);
      border-color: rgba(246, 196, 0, 0.4);
    }

    /* ====== Payment Options ====== */
    .pay-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(255, 255, 255, 0.02);
    }

    .pay-opt:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .pay-opt.active {
      border-color: var(--accent);
      background: rgba(230, 57, 70, 0.06);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.08);
    }

    .pay-opt input[type="radio"] {
      accent-color: var(--accent);
      transform: scale(1.2);
      cursor: pointer;
    }

    .pay-opt-content {
      flex: 1;
    }

    .pay-opt-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .pay-opt-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .pay-opt-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    /* ====== Order Summary ====== */
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    .summary-row span:last-child {
      color: var(--text);
      font-weight: 600;
    }

    .discount-row {
      color: var(--success) !important;
    }

    .discount-row span {
      color: var(--success) !important;
    }

    .summary-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      margin: 8px 0;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 4px;
      border-top: 1.5px solid rgba(255, 255, 255, 0.08);
      margin-top: 6px;
    }

    .summary-total-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .summary-total-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    /* ====== Confirm Button ====== */
    .confirm-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      box-shadow: 0 8px 32px var(--accent-glow);
      transition: all 0.3s;
    }

    .confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(230, 57, 70, 0.4);
    }

    .confirm-btn:active {
      transform: translateY(0);
    }

    .confirm-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: 0.5s;
    }

    .confirm-btn:hover::before {
      left: 100%;
    }

    /* ====== Loading State ====== */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ====== Secure Badge ====== */
    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      padding: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .secure-badge svg {
      width: 14px;
      height: 14px;
      opacity: 0.5;
    }

    /* ====== Animations ====== */
    .fade-in {
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:nth-child(1) {
      animation-delay: 0s;
    }

    .card:nth-child(2) {
      animation-delay: 0.05s;
    }

    .card:nth-child(3) {
      animation-delay: 0.1s;
    }

    .card:nth-child(4) {
      animation-delay: 0.15s;
    }

    .card:nth-child(5) {
      animation-delay: 0.2s;
    }

    .card:nth-child(6) {
      animation-delay: 0.25s;
    }

    /* ====== Responsive ====== */
    @media (max-width: 380px) {
      .content {
        padding: 12px 14px;
      }

      .card {
        padding: 14px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .product-name {
        font-size: 16px;
      }

      .product-price {
        font-size: 22px;
      }

      .summary-total-val {
        font-size: 24px;
      }
    }
  </style>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
  <div class="page">
    <!-- Topbar -->
    <div class="topbar">
      <button class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
      </button>
      <div class="topbar-logo">JERSIFY</div>
      <div class="topbar-title">Checkout</div>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading your order...</div>
    </div>

    <!-- Checkout Content -->
    <div id="checkoutContent" style="display:none">
      <div class="content">

        <!-- Product Card -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
            </svg>
            Your Order
          </div>
          <div class="product-row">
            <div class="product-img" id="productImg">
              <span class="product-img-placeholder">10</span>
            </div>
            <div class="product-info">
              <div class="product-name" id="productTitle">Product Name</div>
              <div class="product-team" id="productSub">Details</div>
              <div class="product-price" id="productPrice">&#8377;0</div>
            </div>
          </div>
        </div>

        <!-- Size Selection -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
              <line x1="3" y1="9" x2="21" y2="9" />
              <line x1="9" y1="21" x2="9" y2="9" />
            </svg>
            Select Size
          </div>
          <div class="size-grid">
            <button class="size-btn" onclick="selectSize(this)">XS</button>
            <button class="size-btn" onclick="selectSize(this)">S</button>
            <button class="size-btn active" onclick="selectSize(this)">M</button>
            <button class="size-btn" onclick="selectSize(this)">L</button>
            <button class="size-btn" onclick="selectSize(this)">XL</button>
            <button class="size-btn" onclick="selectSize(this)">XXL</button>
          </div>
        </div>

        <!-- Shipping Address -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
              <circle cx="12" cy="10" r="3" />
            </svg>
            Shipping Address
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="custName" class="form-input" placeholder="Enter your full name">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="custEmail" class="form-input" placeholder="you@email.com">
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="custPhone" class="form-input" placeholder="+91 9876543210">
            </div>
          </div>
          <div class="form-group">
            <label>Street Address</label>
            <textarea id="custAddress" class="form-input" placeholder="House no, Street, Landmark..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="custCity" class="form-input" placeholder="City">
            </div>
            <div class="form-group">
              <label>State</label>
              <input type="text" id="custState" class="form-input" placeholder="State">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Pincode</label>
              <input type="text" id="custPincode" class="form-input" placeholder="400001" maxlength="6">
            </div>
            <div class="form-group">
              <label>Country</label>
              <input type="text" id="custCountry" class="form-input" value="India" placeholder="India">
            </div>
          </div>
          <button class="location-btn" id="locationBtn" onclick="getLocation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="2" x2="12" y2="4" />
              <line x1="12" y1="20" x2="12" y2="22" />
              <line x1="2" y1="12" x2="4" y2="12" />
              <line x1="20" y1="12" x2="22" y2="12" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <span class="location-text" id="locationText">Use My Current Location</span>
          </button>
        </div>

        <!-- Coupon Code -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 12 20 22 4 22 4 12" />
              <rect x="2" y="7" width="20" height="5" rx="1" />
              <line x1="12" y1="22" x2="12" y2="7" />
              <path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z" />
              <path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z" />
            </svg>
            Coupon Code
          </div>
          <div class="coupon-row">
            <input type="text" id="couponInput" class="coupon-input" placeholder="Enter coupon code">
            <button class="coupon-apply-btn" onclick="applyCoupon()">APPLY</button>
          </div>
          <div class="coupon-msg" id="couponMsg"></div>
          <div class="coupon-tags">
            <span class="coupon-tag" onclick="useCoupon('JERSIFY10')">JERSIFY10</span>
            <span class="coupon-tag" onclick="useCoupon('FIRST20')">FIRST20</span>
            <span class="coupon-tag" onclick="useCoupon('SAVE15')">SAVE15</span>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
              <line x1="1" y1="10" x2="23" y2="10" />
            </svg>
            Payment Method
          </div>
          <label class="pay-opt active" onclick="selPay('razorpay')">
            <input type="radio" name="paymethod" id="pay_rzp" checked value="razorpay">
            <div class="pay-opt-content">
              <div class="pay-opt-text">Pay Online</div>
              <div class="pay-opt-sub">UPI, Cards, Net Banking via Razorpay</div>
            </div>
            <div class="pay-opt-icon">💳</div>
          </label>
          <label class="pay-opt" onclick="selPay('cod')">
            <input type="radio" name="paymethod" id="pay_cod" value="cod">
            <div class="pay-opt-content">
              <div class="pay-opt-text">Cash on Delivery</div>
              <div class="pay-opt-sub">Pay when you receive your order</div>
            </div>
            <div class="pay-opt-icon">💵</div>
          </label>
        </div>

        <!-- Order Summary -->
        <div class="card fade-in">
          <div class="card-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Order Summary
          </div>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subTotal">&#8377;0</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span style="color: var(--success)">FREE</span>
          </div>
          <div class="summary-row discount-row" id="discountRow" style="display:none;">
            <span>Discount</span>
            <span id="discountVal">-&#8377;0</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-total">
            <div class="summary-total-label">Total</div>
            <div class="summary-total-val" id="finalTotal">&#8377;0</div>
          </div>
        </div>

        <!-- Confirm Button -->
        <button class="confirm-btn" onclick="processOrder()">
          CONFIRM ORDER &rarr;
        </button>

        <div class="secure-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          Secured with 256-bit SSL Encryption
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA4O7ROp8srleiFAZSmiyd6ml7Ruv8eN74",
      authDomain: "jersify-f9b5e.firebaseapp.com",
      projectId: "jersify-f9b5e",
      storageBucket: "jersify-f9b5e.firebasestorage.app",
      messagingSenderId: "461181023878",
      appId: "1:461181023878:web:6ebfbae603baf4a873c307"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let orderPrice = 0;
    let orderItem = "";
    let discountAmount = 0;
    let couponApplied = false;

    // Available coupons
    const COUPONS = {
      'JERSIFY10': { type: 'percent', value: 10, desc: '10% OFF' },
      'FIRST20': { type: 'percent', value: 20, desc: '20% OFF' },
      'SAVE15': { type: 'percent', value: 15, desc: '15% OFF' },
      'FLAT200': { type: 'flat', value: 200, desc: 'Flat Rs.200 OFF' },
      'JERSEY50': { type: 'flat', value: 50, desc: 'Flat Rs.50 OFF' }
    };

    // Size selector
    window.selectSize = (btn) => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };

    // Payment method selector
    window.selPay = (method) => {
      document.querySelectorAll('.pay-opt').forEach(el => el.classList.remove('active'));
      if (method === 'razorpay') document.getElementById('pay_rzp').parentElement.classList.add('active');
      else document.getElementById('pay_cod').parentElement.classList.add('active');
    };

    // Location auto-fill
    window.getLocation = () => {
      const btn = document.getElementById('locationBtn');
      const text = document.getElementById('locationText');

      if (!navigator.geolocation) {
        text.textContent = 'Geolocation not supported';
        return;
      }

      btn.classList.add('loading');
      text.textContent = 'Detecting location...';

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          try {
            const { latitude, longitude } = position.coords;
            // Use reverse geocoding
            const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`);
            const data = await resp.json();

            if (data && data.address) {
              const addr = data.address;
              document.getElementById('custAddress').value = [
                addr.house_number, addr.road, addr.neighbourhood, addr.suburb
              ].filter(Boolean).join(', ');
              document.getElementById('custCity').value = addr.city || addr.town || addr.village || '';
              document.getElementById('custState').value = addr.state || '';
              document.getElementById('custPincode').value = addr.postcode || '';
              document.getElementById('custCountry').value = addr.country || 'India';

              text.textContent = 'Location detected successfully!';
              btn.classList.remove('loading');
              btn.classList.add('success');
            }
          } catch (err) {
            console.error('Geocoding error:', err);
            text.textContent = 'Could not detect address. Enter manually.';
            btn.classList.remove('loading');
          }
        },
        (error) => {
          console.error('Location error:', error);
          text.textContent = 'Location access denied. Enter manually.';
          btn.classList.remove('loading');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    };

    // Coupon functions
    window.useCoupon = (code) => {
      document.getElementById('couponInput').value = code;
      applyCoupon();
    };

    window.applyCoupon = () => {
      const code = document.getElementById('couponInput').value.trim().toUpperCase();
      const msgEl = document.getElementById('couponMsg');

      if (!code) {
        msgEl.textContent = 'Please enter a coupon code.';
        msgEl.className = 'coupon-msg error';
        return;
      }

      if (couponApplied) {
        msgEl.textContent = 'A coupon is already applied. Remove it first.';
        msgEl.className = 'coupon-msg error';
        return;
      }

      const coupon = COUPONS[code];
      if (!coupon) {
        msgEl.textContent = 'Invalid coupon code. Please try again.';
        msgEl.className = 'coupon-msg error';
        return;
      }

      // Apply discount
      if (coupon.type === 'percent') {
        discountAmount = Math.round(orderPrice * coupon.value / 100);
      } else {
        discountAmount = coupon.value;
      }

      if (discountAmount > orderPrice) discountAmount = orderPrice;
      couponApplied = true;

      msgEl.textContent = `${coupon.desc} applied! You save Rs.${discountAmount}`;
      msgEl.className = 'coupon-msg success';

      // Update totals
      document.getElementById('discountRow').style.display = 'flex';
      document.getElementById('discountVal').textContent = `-\u20B9${discountAmount}`;
      updateTotal();
    };

    function updateTotal() {
      const finalPrice = orderPrice - discountAmount;
      document.getElementById('finalTotal').textContent = `\u20B9${finalPrice}`;
    }

    // Load product data
    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const pid = params.get('id');

      if (!pid) {
        document.getElementById('loading').innerHTML = `
        <div class="loading-text" style="color: var(--accent);">No product selected!</div>
        <a href="index.html" style="color:var(--muted);font-size:13px;">Go back to shop</a>
      `;
        return;
      }

      try {
        const docSnap = await getDoc(doc(db, "products", pid));
        if (docSnap.exists()) {
          const p = docSnap.data();
          orderItem = p.name || 'Jersify Kit';
          orderPrice = p.price ? parseInt(p.price) : 1499;

          document.getElementById('productTitle').textContent = orderItem;
          document.getElementById('productSub').textContent = p.team || p.type || 'Official Kit';
          document.getElementById('productPrice').textContent = '\u20B9' + orderPrice;
          document.getElementById('subTotal').textContent = '\u20B9' + orderPrice;
          document.getElementById('finalTotal').textContent = '\u20B9' + orderPrice;

          if (p.imgUrl) {
            document.getElementById('productImg').innerHTML = `<img src="${p.imgUrl}" alt="${orderItem}">`;
          }

          document.getElementById('loading').style.display = 'none';
          document.getElementById('checkoutContent').style.display = 'block';
        } else {
          document.getElementById('loading').innerHTML = `
          <div class="loading-text" style="color: var(--accent);">Product not found!</div>
          <a href="index.html" style="color:var(--muted);font-size:13px;">Browse other kits</a>
        `;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = `
        <div class="loading-text" style="color: var(--accent);">Error loading product</div>
      `;
      }
    });

    // Process order
    window.processOrder = () => {
      const isRzp = document.getElementById('pay_rzp').checked;
      const name = document.getElementById('custName').value.trim();
      const phone = document.getElementById('custPhone').value.trim();
      const address = document.getElementById('custAddress').value.trim();
      const city = document.getElementById('custCity').value.trim();
      const state = document.getElementById('custState').value.trim();
      const pincode = document.getElementById('custPincode').value.trim();

      // Validation
      if (!name) { shakeField('custName'); alert('Please enter your name.'); return; }
      if (!phone || phone.length < 10) { shakeField('custPhone'); alert('Please enter a valid phone number.'); return; }
      if (!address) { shakeField('custAddress'); alert('Please enter your address.'); return; }
      if (!city) { shakeField('custCity'); alert('Please enter your city.'); return; }
      if (!pincode || pincode.length < 4) { shakeField('custPincode'); alert('Please enter a valid pincode.'); return; }

      const finalPrice = orderPrice - discountAmount;
      const selectedSize = document.querySelector('.size-btn.active')?.textContent || 'M';

      if (isRzp) {
        const options = {
          "key": "rzp_test_YourMockKeyHere123",
          "amount": finalPrice * 100,
          "currency": "INR",
          "name": "JERSIFY",
          "description": `${orderItem} (Size: ${selectedSize})`,
          "image": "https://dummyimage.com/100x100/111/fff&text=J",
          "handler": function (response) {
            showSuccess(response.razorpay_payment_id);
          },
          "prefill": {
            "name": name,
            "email": document.getElementById('custEmail').value,
            "contact": phone
          },
          "notes": {
            "address": `${address}, ${city}, ${state} - ${pincode}`,
            "size": selectedSize
          },
          "theme": { "color": "#e63946" }
        };
        const rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', (response) => {
          alert("Payment Failed: " + response.error.description);
        });
        rzp1.open();
      } else {
        showSuccess('COD-' + Date.now());
      }
    };

    function showSuccess(orderId) {
      document.querySelector('.content').innerHTML = `
      <div style="text-align:center; padding: 60px 20px;">
        <div style="font-size:64px; margin-bottom:16px;">🎉</div>
        <div style="font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--success); letter-spacing:2px;">ORDER CONFIRMED!</div>
        <div style="color:var(--muted); margin-top:8px; font-size:13px;">Order ID: ${orderId}</div>
        <div style="color:var(--muted); margin-top:16px; font-size:14px; line-height:1.6;">
          Thank you for shopping with Jersify! Your order is being processed and you'll receive a confirmation shortly.
        </div>
        <button onclick="window.location.href='index.html'" style="margin-top:28px; border:none; background:linear-gradient(135deg, var(--accent), var(--accent-dark)); color:#fff; border-radius:14px; padding:14px 32px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:800; letter-spacing:1px; cursor:pointer; box-shadow:0 8px 24px var(--accent-glow);">
          CONTINUE SHOPPING
        </button>
      </div>
    `;
    }

    function shakeField(id) {
      const el = document.getElementById(id);
      el.style.borderColor = 'var(--accent)';
      el.style.animation = 'shake 0.4s ease';
      setTimeout(() => {
        el.style.animation = '';
        el.style.borderColor = '';
      }, 500);
    }
  </script>

  <style>
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20%,
      60% {
        transform: translateX(-6px);
      }

      40%,
      80% {
        transform: translateX(6px);
      }
    }
  </style>

</body>

</html>
