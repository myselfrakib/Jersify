<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JERSIFY — Secure Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700;800&display=swap');

        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --accent: #c61f2f;
            --accent2: #8f0f1d;
            --success: #1e8c4a;
            --gold: #b8860b;
            --gold-bg: #fffbeb;
            --gold-border: #fde68a;
            --text: #111;
            --muted: #6f6f6f;
            --border: #ececec;
            --maxw: 440px;
            --radius: 18px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 60px;
        }

        /* ── Top bar ── */
        .topbar {
            width: 100%;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            letter-spacing: 3px;
            color: var(--accent);
        }

        .topbar-secure {
            position: absolute;
            right: 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .wrap {
            width: min(100%, var(--maxw));
            padding: 20px 16px 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .05);
        }

        .card-hd {
            padding: 14px 18px 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .card-body {
            padding: 14px 18px;
        }

        /* ── COD advance banner ── */
        .cod-banner {
            background: var(--gold-bg);
            border: 1.5px solid var(--gold-border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .cod-banner-icon {
            font-size: 22px;
            flex-shrink: 0;
            line-height: 1.3;
        }

        .cod-banner-body {
            flex: 1;
        }

        .cod-banner-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .cod-banner-text {
            font-size: 12px;
            color: #92400e;
            line-height: 1.65;
        }

        .cod-banner-pill {
            display: inline-block;
            margin-top: 8px;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 99px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 800;
            color: #78350f;
        }

        /* ── Item row ── */
        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: #f0f0f0;
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-img-ph {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            background: #f0f0f0;
            display: grid;
            place-items: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .item-name {
            font-size: 13px;
            font-weight: 700;
        }

        .item-meta {
            font-size: 11px;
            color: var(--muted);
        }

        .item-price {
            margin-left: auto;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
        }

        /* ── Price rows ── */
        .pr {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }

        .pr.total {
            font-size: 16px;
            font-weight: 800;
            border-top: 2px solid var(--border);
            margin-top: 8px;
            padding-top: 12px;
        }

        .pr.total span:last-child {
            color: var(--accent);
        }

        .pr .muted {
            color: var(--muted);
        }

        .pr .green {
            color: var(--success);
            font-weight: 700;
        }

        .pr.due-now {
            background: #fef9ec;
            border: 1.5px solid #fcd34d;
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 10px;
            font-weight: 800;
        }

        .pr.due-now span:first-child {
            color: var(--gold);
        }

        .pr.due-now span:last-child {
            color: var(--gold);
            font-size: 16px;
        }

        .pr.remaining {
            font-size: 12px;
            padding: 4px 0 2px;
        }

        .pr.remaining span:first-child {
            color: var(--muted);
            font-style: italic;
        }

        .pr.remaining span:last-child {
            color: var(--muted);
            font-weight: 700;
        }

        /* ── Address ── */
        .addr-line {
            font-size: 13px;
            line-height: 1.7;
        }

        .addr-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        /* ── Pay button ── */
        .pay-btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 16px;
            background: linear-gradient(160deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: .5px;
            cursor: pointer;
            box-shadow: 0 10px 28px rgba(198, 31, 47, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform .15s, box-shadow .15s;
        }

        .pay-btn.cod {
            background: linear-gradient(160deg, #d97706, #b45309);
            box-shadow: 0 10px 28px rgba(180, 83, 9, .3);
        }

        .pay-btn.cod:hover {
            box-shadow: 0 14px 32px rgba(180, 83, 9, .38);
        }

        .pay-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 32px rgba(198, 31, 47, .35);
        }

        .pay-btn:disabled {
            opacity: .6;
            cursor: default;
            transform: none;
        }

        .pay-btn-amount {
            font-size: 18px;
        }

        /* ── Error box ── */
        .err-box {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .err-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .err-box h2 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }

        /* ── Payment failed banner ── */
        .failed-banner {
            background: #fff5f5;
            border: 1.5px solid rgba(198, 31, 47, .3);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .failed-banner-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .failed-banner-body {
            flex: 1;
        }

        .failed-banner-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .failed-banner-text {
            font-size: 12px;
            color: #7a1f1f;
            line-height: 1.6;
        }

        .retry-btn {
            margin-top: 12px;
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity .2s;
        }

        .retry-btn:hover {
            opacity: .88;
        }

        /* ── Overlay ── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(4px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #overlay.show {
            display: flex;
        }

        .ov-box {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px;
            text-align: center;
            max-width: 280px;
            width: 90%;
        }

        .ov-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(198, 31, 47, .15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }

        .ov-title {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 6px;
        }

        .ov-sub {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        /* ── Success overlay ── */
        #successOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(6px);
            z-index: 110;
            align-items: center;
            justify-content: center;
        }

        #successOverlay.show {
            display: flex;
        }

        .success-box {
            background: #fff;
            border-radius: 28px;
            padding: 36px 28px;
            text-align: center;
            max-width: 300px;
            width: 92%;
            animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        .success-emoji {
            font-size: 60px;
            display: block;
            margin-bottom: 14px;
        }

        .success-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--success);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .success-sub {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .success-btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 14px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(198, 31, 47, .28);
        }

        .success-countdown {
            font-size: 11px;
            color: var(--muted);
            margin-top: 12px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .badge-green {
            background: #dcfce7;
            color: #166534;
        }

        .badge-blue {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-gold {
            background: #fef3c7;
            color: #78350f;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(.3);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-logo">JERSIFY</div>
        <div class="topbar-secure">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            Secure Payment
        </div>
    </div>

    <div class="wrap" id="mainWrap">
        <div class="card">
            <div class="card-body" style="text-align:center;padding:40px 20px;color:var(--muted);">
                <div style="font-size:36px;margin-bottom:12px;">⏳</div>
                <div style="font-weight:700;">Loading your order…</div>
            </div>
        </div>
    </div>

    <!-- Processing overlay (shown during DB write + redirect) -->
    <div id="overlay">
        <div class="ov-box">
            <div class="ov-spinner"></div>
            <div class="ov-title" id="overlayTitle">Confirming your order…</div>
            <div class="ov-sub" id="overlaySub">Please don't close this page.</div>
        </div>
    </div>

    <!-- Success overlay (shown after DB write, before redirect) -->
    <div id="successOverlay">
        <div class="success-box">
            <span class="success-emoji">🎉</span>
            <div class="success-title">Order Confirmed!</div>
            <div class="success-sub" id="successSub">Your order has been placed.<br>Redirecting to your profile…</div>
            <button class="success-btn" id="successBtn" onclick="goToProfile()">View My Orders →</button>
            <div class="success-countdown" id="successCountdown"></div>
        </div>
    </div>

    <script type="module">
        /* ══════════════════════════════════════════════════════════
           JERSIFY BOOKING PAGE
           — Handles Razorpay payment
           — Writes order to Firebase ONLY after confirmed payment
           — Redirects to jersify.online/profile.html on success
           — Shows failure UI with retry on cancellation/failure
        ══════════════════════════════════════════════════════════ */

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        /* ── Firebase config (same project as Jersify) ── */
        const firebaseConfig = {
            apiKey: "AIzaSyA4O7ROp8srleiFAZSmiyd6ml7Ruv8eN74",
            authDomain: "jersify-f9b5e.firebaseapp.com",
            databaseURL: "https://jersify-f9b5e-default-rtdb.firebaseio.com",
            projectId: "jersify-f9b5e",
            storageBucket: "jersify-f9b5e.firebasestorage.app",
            messagingSenderId: "461181023878",
            appId: "1:461181023878:web:6ebfbae603baf4a873c307"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const RZP_KEY = 'rzp_live_omDNDSL8gmUBCZ';
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const JERSIFY_BASE = isLocal ? '' : 'https://jersify.online';

        /* ── Parse URL params ── */
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('oid') || '';
        const amtRaw = parseFloat(params.get('amt') || '0');
        const fullTotal = parseFloat(params.get('total') || '0') || amtRaw;
        const name = params.get('n') || '';
        const email = params.get('e') || '';
        const phone = params.get('ph') || '';
        const size = params.get('sz') || 'M';
        const userId = params.get('uid') || '';
        const userEmail = params.get('ue') || '';
        const dataRaw = params.get('d') || '';
        const mode = params.get('mode') || '';

        const isCodAdvance = mode === 'cod_advance';
        const chargeNow = amtRaw;
        const remaining = isCodAdvance ? (fullTotal - chargeNow) : 0;

        /* ── Decode payload ── */
        let payload = {};
        try { payload = JSON.parse(decodeURIComponent(escape(atob(dataRaw)))); } catch (_) { }

        const items = Array.isArray(payload.items) ? payload.items : [];
        const address = payload.address || '';
        const city = payload.city || '';
        const state = payload.state || '';
        const pincode = payload.pincode || '';
        const country = payload.country || 'India';
        const subtotal = payload.subtotal || fullTotal;
        const discount = payload.discount || 0;

        /* ── Validate ── */
        if (!orderId || !amtRaw || !name) {
            document.getElementById('mainWrap').innerHTML = `
      <div class="card"><div class="err-box">
        <span class="icon">⚠️</span>
        <h2>Invalid Payment Link</h2>
        <p>Missing order details. Go back to Jersify checkout and try again.</p>
        <br><a href="${JERSIFY_BASE}" style="color:var(--accent);font-weight:700;">← Back to Jersify</a>
      </div></div>`;
            throw new Error('Missing required params');
        }

        /* ── Helpers ── */
        function esc(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function showOverlay(title, sub) {
            document.getElementById('overlayTitle').textContent = title || 'Processing…';
            document.getElementById('overlaySub').textContent = sub || 'Please wait.';
            document.getElementById('overlay').classList.add('show');
        }
        function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

        let profileRedirectTimer = null;
        function goToProfile() {
            clearInterval(profileRedirectTimer);
            window.location.href = `${JERSIFY_BASE}/profile.html?newOrder=${encodeURIComponent(orderId)}`;
        }
        window.goToProfile = goToProfile;

        function showSuccess() {
            hideOverlay();
            document.getElementById('successOverlay').classList.add('show');
            let count = 5;
            document.getElementById('successCountdown').textContent = `Auto-redirecting in ${count}s…`;
            profileRedirectTimer = setInterval(() => {
                count--;
                const el = document.getElementById('successCountdown');
                if (el) el.textContent = `Auto-redirecting in ${count}s…`;
                if (count <= 0) { clearInterval(profileRedirectTimer); goToProfile(); }
            }, 1000);
        }

        /* ══════════════════════════════════════════════════
           WRITE ORDER TO FIREBASE — called only after
           Razorpay confirms successful payment
        ══════════════════════════════════════════════════ */
        async function writeOrderToFirebase(paymentId) {
            const now = new Date().toISOString();
            const orderData = {
                orderId,
                userId: userId || 'anonymous',
                userEmail: userEmail,
                customerName: name,
                phone,
                email,
                address,
                city,
                state,
                pincode,
                country,
                items,
                selectedSize: size,
                subtotal,
                discount,
                total: fullTotal,
                paymentMethod: isCodAdvance ? 'cod' : 'online',
                paymentId,
                advancePaid: isCodAdvance ? chargeNow : null,
                remainingOnDelivery: isCodAdvance ? remaining : null,
                advancePaidAt: isCodAdvance ? now : null,
                status: 'confirmed',
                source: 'jersifybooking',
                createdAt: now,
                confirmedAt: now
            };

            /* Write order record */
            await set(ref(db, `orders/${orderId}`), orderData);

            /* Link order to user */
            if (userId && userId !== 'anonymous') {
                await update(ref(db, `users/${userId}/orders`), { [orderId]: true });
            }
        }

        /* ══════════════════════════════════════════════════
           SHOW PAYMENT FAILED UI (retry without page reload)
        ══════════════════════════════════════════════════ */
        function showPaymentFailed(reason) {
            hideOverlay();
            const wrap = document.getElementById('mainWrap');
            /* Prepend the failure banner above the existing content */
            const banner = document.createElement('div');
            banner.className = 'failed-banner';
            banner.innerHTML = `
      <span class="failed-banner-icon">❌</span>
      <div class="failed-banner-body">
        <div class="failed-banner-title">Payment Not Completed</div>
        <div class="failed-banner-text">
          ${reason || 'Your payment was cancelled or failed. Your order has NOT been placed.'}<br>
          No money has been charged. You can try again below.
        </div>
        <button class="retry-btn" id="retryBtn">Try Payment Again →</button>
      </div>`;
            wrap.insertBefore(banner, wrap.firstChild);
            document.getElementById('retryBtn').addEventListener('click', () => {
                banner.remove();
                startPayment();
            });
            /* Re-enable the pay button */
            const payBtn = document.getElementById('payBtn');
            if (payBtn) payBtn.disabled = false;
        }

        /* ══════════════════════════════════════════════════
           BUILD PAGE UI
        ══════════════════════════════════════════════════ */
        const itemsHtml = items.length
            ? items.map(it => `
        <div class="item-row">
          ${(it.imgUrl || it.imageUrl || it.img)
                    ? `<img class="item-img" src="${esc(it.imgUrl || it.imageUrl || it.img)}" onerror="this.style.display='none'"/>`
                    : `<div class="item-img-ph">👕</div>`}
          <div style="flex:1;min-width:0;">
            <div class="item-name">${esc(it.name || 'Jersey')}</div>
            <div class="item-meta">Qty: ${it.qty || 1}${it.size ? ' · ' + it.size : ''}</div>
          </div>
          <div class="item-price">₹${Number(it.price || 0).toLocaleString('en-IN')}</div>
        </div>`).join('')
            : `<div class="item-row">
        <div class="item-img-ph">👕</div>
        <div style="flex:1;"><div class="item-name">Jersify Order</div></div>
        <div class="item-price">₹${fullTotal.toLocaleString('en-IN')}</div>
       </div>`;

        const addrHtml = address
            ? `<div class="addr-name">${esc(name)}</div>
       <div class="addr-line">${esc(address)}</div>
       <div class="addr-line">${esc([city, state, pincode].filter(Boolean).join(', '))}</div>
       <div class="addr-line">${esc(country)}${phone ? ' · ' + esc(phone) : ''}</div>`
            : `<div class="addr-name">${esc(name)}</div>
       <div class="addr-line" style="color:var(--muted);">Address on file</div>`;

        const priceSummaryHtml = isCodAdvance ? `
    <div class="pr"><span class="muted">Order Total</span><span>₹${fullTotal.toLocaleString('en-IN')}</span></div>
    <div class="pr"><span class="muted">Shipping</span><span class="green">FREE</span></div>
    ${discount > 0 ? `<div class="pr"><span class="muted">Discount</span><span class="green">−₹${Number(discount).toLocaleString('en-IN')}</span></div>` : ''}
    <div class="pr total"><span>Order Total</span><span>₹${fullTotal.toLocaleString('en-IN')}</span></div>
    <div class="pr due-now"><span>💳 Pay Now (Advance)</span><span>₹${chargeNow.toLocaleString('en-IN')}</span></div>
    <div class="pr remaining"><span>🚚 Remaining at delivery</span><span>₹${remaining.toLocaleString('en-IN')}</span></div>
  ` : `
    <div class="pr"><span class="muted">Subtotal</span><span>₹${Number(subtotal).toLocaleString('en-IN')}</span></div>
    <div class="pr"><span class="muted">Shipping</span><span class="green">FREE</span></div>
    ${discount > 0 ? `<div class="pr"><span class="muted">Discount</span><span class="green">−₹${Number(discount).toLocaleString('en-IN')}</span></div>` : ''}
    <div class="pr total"><span>Total</span><span>₹${fullTotal.toLocaleString('en-IN')}</span></div>
  `;

        const codBannerHtml = isCodAdvance ? `
    <div class="cod-banner">
      <span class="cod-banner-icon">🚚</span>
      <div class="cod-banner-body">
        <div class="cod-banner-title">Cash on Delivery — Advance Required</div>
        <div class="cod-banner-text">
          A small advance of <strong>₹${chargeNow.toLocaleString('en-IN')}</strong> is required to confirm your COD order.
          The remaining <strong>₹${remaining.toLocaleString('en-IN')}</strong> will be collected in cash at delivery.
        </div>
        <span class="cod-banner-pill">Full order value: ₹${fullTotal.toLocaleString('en-IN')}</span>
      </div>
    </div>
  ` : '';

        const badgeHtml = isCodAdvance
            ? `<span class="badge badge-gold">COD Advance · ${esc(orderId)}</span>`
            : `<span class="badge badge-blue">Order · ${esc(orderId)}</span>`;

        const btnLabel = isCodAdvance
            ? `Pay ₹<span class="pay-btn-amount">${chargeNow.toLocaleString('en-IN')}</span>&nbsp;Advance`
            : `Pay <span class="pay-btn-amount">₹${Number(chargeNow).toLocaleString('en-IN')}</span>`;

        document.getElementById('mainWrap').innerHTML = `
    <div style="text-align:center;padding:4px 0 6px;">${badgeHtml}</div>

    ${codBannerHtml}

    <div class="card">
      <div class="card-hd">🛒 Your Order</div>
      <div class="card-body">${itemsHtml}</div>
    </div>

    <div class="card">
      <div class="card-hd">💰 Price Summary</div>
      <div class="card-body">${priceSummaryHtml}</div>
    </div>

    <div class="card">
      <div class="card-hd">📦 Shipping To</div>
      <div class="card-body">${addrHtml}</div>
    </div>

    <button class="pay-btn${isCodAdvance ? ' cod' : ''}" id="payBtn" onclick="startPayment()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      ${btnLabel}
    </button>

    <div style="text-align:center;font-size:11px;color:var(--muted);padding-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Secured by Razorpay · UPI, Cards, Net Banking accepted
    </div>
  `;

        /* ══════════════════════════════════════════════════
           START RAZORPAY PAYMENT
        ══════════════════════════════════════════════════ */
        window.startPayment = async function () {
            const btn = document.getElementById('payBtn');
            if (btn) btn.disabled = true;

            showOverlay('Initializing...', 'Securely creating your order.');

            try {
                const createUrl = isLocal ? '/api/create-rzp-order' : 'https://us-central1-jersify-f9b5e.cloudfunctions.net/createRazorpayOrder';
                const createRes = await fetch(createUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: chargeNow,
                        orderId: orderId
                    })
                });

                if (!createRes.ok) {
                    const errText = await createRes.text();
                    throw new Error('Failed to create secure order: ' + errText);
                }
                const orderData = await createRes.json();
                
                hideOverlay();

                const options = {
                    key: RZP_KEY,
                    amount: orderData.amount,
                    currency: 'INR',
                    order_id: orderData.order_id,
                    name: 'Jersify',
                    description: isCodAdvance ? `COD Advance – ${orderId}` : `Order – ${orderId}`,
                    image: `${JERSIFY_BASE}/logo.png`,
                    prefill: { name, email, contact: phone },
                    theme: { color: isCodAdvance ? '#d97706' : '#c61f2f' },
                    notes: { orderId: orderId },

                    modal: {
                        ondismiss: () => {
                            showPaymentFailed('You closed the payment window before completing the payment.');
                        }
                    },

                    handler: async function (response) {
                        showOverlay('Verifying Payment...', 'Please do not close this window.');

                        try {
                            const verifyUrl = isLocal ? '/api/verify-rzp-signature' : 'https://us-central1-jersify-f9b5e.cloudfunctions.net/verifyRazorpayPaymentSignature';
                            const verifyRes = await fetch(verifyUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_signature: response.razorpay_signature,
                                    orderId: orderId,
                                    amountPaid: chargeNow
                                })
                            });

                            const verifyData = await verifyRes.json();
                            
                            if (verifyData.success) {
                                const currentParams = window.location.search;
                                const separator = currentParams ? '&' : '?';
                                window.location.href = `${JERSIFY_BASE}/checkout.html${currentParams}${separator}paymentId=${encodeURIComponent(response.razorpay_payment_id)}`;
                            } else {
                                throw new Error(verifyData.error || 'Payment verification failed');
                            }
                        } catch (err) {
                            showPaymentFailed(err.message);
                        }
                    }
                };

                const rzp = new window.Razorpay(options);
                rzp.on('payment.failed', function (resp) {
                    const reason = resp?.error?.description || 'The payment was declined or failed.';
                    showPaymentFailed(reason);
                });
                rzp.open();

            } catch (e) {
                hideOverlay();
                if (btn) btn.disabled = false;
                showPaymentFailed('Could not open payment window: ' + e.message);
            }
        };
    </script>
</body>

</html>
